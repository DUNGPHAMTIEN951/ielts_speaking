            { id: 104, en: "gain weight", vi: "tăng cân", type: "v" },
            { id: 105, en: "hard-working", vi: "chăm chỉ", type: "adj" },
            { id: 106, en: "dark", vi: "tối", type: "adj" },
            { id: 107, en: "untidy", vi: "bừa bộn", type: "adj" },
            { id: 108, en: "regularly", vi: "thường xuyên", type: "adv" },
            { id: 109, en: "campaign", vi: "chiến dịch", type: "n" },
            { id: 110, en: "idea", vi: "ý tưởng", type: "n" },
            { id: 111, en: "tired eyes", vi: "mỏi mắt", type: "n" },
            { id: 112, en: "eyedrops", vi: "thuốc nhỏ mắt", type: "n" },
            { id: 113, en: "Japanese", vi: "người Nhật", type: "n" },
            { id: 114, en: "cooking oil", vi: "dầu ăn", type: "n" },
            { id: 115, en: "product", vi: "sản phẩm", type: "n" },
            { id: 116, en: "soybean", vi: "đậu nành", type: "n" },
            { id: 117, en: "protein", vi: "chất đạm", type: "n" },
            { id: 118, en: "fat", vi: "chất béo", type: "n" },
            { id: 119, en: "agree with sb", vi: "đồng ý với ai", type: "v" },
            { id: 120, en: "disagree with sb", vi: "không đồng ý với ai", type: "v" }
        ];

        // --- APP LOGIC ---
        let currentTab = 'vocab';
        let currentIndex = 0;
        let isFlipped = false;
        let activeList = [];
        let isShuffled = false;
        let currentMode = 'fill';
        let currentPage = 1;
        const itemsPerPage = 20;
        let fullExercises = {};
        let structIdx = 0;
        let recognition;
        let isRecording = false;

        window.onload = function () {
            document.getElementById('header-count').innerText = vocabData.length;
            activeList = [...vocabData];
            renderVocabLines();
            updateFlashcard();
            renderStructureCard();
            fullExercises = generateExerciseData();
            switchPracticeMode('fill');
        };

        // EXERCISE GENERATOR - REFINED LOGIC
        function generateExerciseData() {
            const exercises = { fill: [], wf: [], gram: [], type1: [], type2: [] };
            vocabData.forEach((word, index) => {
                const en = word.en.trim();
                const vi = word.vi.trim();
                const type = word.type ? word.type.trim().toLowerCase() : '';

                // 1. Điền từ (Spelling)
                let masked = en.split('').map(c => (c === ' ' || c === '/' || Math.random() > 0.5) ? c : '_').join('');
                if (!masked.includes('_')) masked = en.replace(/./, '_'); // Ensure at least 1 mask
                exercises.fill.push({ 
                    id: index, 
                    word: en, 
                    question: `Điền ký tự còn thiếu: <span class="font-mono font-bold text-emerald-600 text-lg tracking-widest bg-emerald-50 px-2 py-1 rounded border border-emerald-200">${masked}</span> <br><span class="text-xs text-gray-500 italic mt-1">Nghĩa: ${vi}</span>`, 
                    answer: en 
                });

                // 2. Word Form (Contextual Frame based on Type)
                let wfQ = "";
                if (type.includes('n')) wfQ = `This is a/an _______ .`;
                else if (type.includes('v')) wfQ = `I want to _______ .`;
                else if (type.includes('adj')) wfQ = `It looks very _______ .`;
                else if (type.includes('adv')) wfQ = `He does it _______ .`;
                else wfQ = `The word is _______ .`;
                exercises.wf.push({ 
                    id: index, 
                    root: en, 
                    question: `<div class="font-medium text-slate-700">${wfQ}</div><div class="text-xs text-gray-400 mt-1">Gợi ý: ${vi} (${type})</div>`, 
                    answer: en 
                });

                // 3. Grammar (Inflections)
                let gramQ = "";
                let gramAns = "";
                if (type.includes('n')) {
                    gramQ = `Viết dạng <b>số nhiều</b> của: <span class="font-bold text-teal-600">${en}</span>`;
                    if (en.endsWith('y') && !/[aeiou]y$/.test(en)) gramAns = en.slice(0, -1) + "ies";
                    else if (en.match(/(s|x|z|ch|sh)$/)) gramAns = en + "es";
                    else gramAns = en + "s";
                    if(en === 'person') gramAns = 'people'; // Exception logic
                } else if (type.includes('v')) {
                    gramQ = `Viết dạng <b>V-ing</b> của: <span class="font-bold text-teal-600">${en}</span>`;
                    if (en.endsWith('e') && !en.endsWith('ee')) gramAns = en.slice(0, -1) + "ing";
                    else gramAns = en + "ing";
                } else if (type.includes('adj')) {
                    gramQ = `Viết dạng <b>so sánh hơn</b> của: <span class="font-bold text-teal-600">${en}</span>`;
                    if (en === 'good') gramAns = 'better';
                    else if (en === 'bad') gramAns = 'worse';
                    else if (en.length <= 6 && !en.endsWith('ing') && !en.endsWith('ed')) {
                        if (en.endsWith('y')) gramAns = en.slice(0, -1) + "ier";
                        else if (en.endsWith('e')) gramAns = en + "r";
                        else gramAns = en + "er";
                    } else {
                        gramAns = "more " + en;
                    }
                } else {
                    gramQ = `Viết lại từ này: <span class="font-bold text-teal-600">${en}</span>`;
                    gramAns = en;
                }
                exercises.gram.push({ id: index, word: en, question: gramQ, answer: gramAns });

                // 4. Type 1: Trắc nghiệm (Sắp xếp & Từ loại)
                // Check if phrase (has spaces) for Ordering
                if (en.trim().includes(' ')) {
                    exercises.type1.push({
                        id: index,
                        type: 'order',
                        question: `Sắp xếp các từ sau thành cụm từ đúng (Nghĩa: ${vi}):`,
                        words: en.split(' ').sort(() => Math.random() - 0.5),
                        answer: en
                    });
                } else {
                    // Single word -> Part of Speech
                    // Map type codes to full names
                    const typeMap = { 'n': 'Danh từ (Noun)', 'v': 'Động từ (Verb)', 'adj': 'Tính từ (Adjective)', 'adv': 'Trạng từ (Adverb)', 'prep': 'Giới từ (Preposition)' };
                    const correctType = typeMap[type] || type;
                    const allTypes = Object.values(typeMap);
                    // 3 distractors
                    const options = allTypes.filter(t => t !== correctType).sort(() => 0.5 - Math.random()).slice(0, 3);
                    options.push(correctType);
                    options.sort(() => 0.5 - Math.random());
                    
                    exercises.type1.push({
                        id: index,
                        type: 'choice',
                        question: `Từ "<span class="font-bold text-emerald-600">${en}</span>" thuộc loại từ nào?`,
                        options: options,
                        answer: correctType
                    });
                }

                // 5. Type 2 (Write) - Translation
                exercises.type2.push({ id: index, type: 'write', question: `Dịch sang tiếng Anh: "<span class="font-bold text-emerald-600">${vi}</span>"`, answer: en });
            });
            return exercises;
        }

        // TABS
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('tab-active', 'bg-emerald-100'); b.classList.add('hover:bg-gray-50'); });
            document.getElementById(`tab-${tab}`).classList.add('tab-active', 'bg-emerald-100');
            document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden-section'));
            document.getElementById(`section-${tab}`).classList.remove('hidden-section');
        }

        document.addEventListener('keydown', (e) => {
            // Ignore if typing in input or textarea
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            if (currentTab === 'flashcard') {
                if (e.code === 'Space') { e.preventDefault(); flipCard(); }
                if (e.code === 'ArrowRight') changeCard(1);
                if (e.code === 'ArrowLeft') changeCard(-1);
            }
        });

        // VOCAB
        function renderVocabLines(filter = "") {
            const grid = document.getElementById('vocab-grid'); grid.innerHTML = "";
            const filtered = vocabData.filter(item => item.en.toLowerCase().includes(filter.toLowerCase()) || item.vi.toLowerCase().includes(filter.toLowerCase()));
            document.getElementById('vocab-count').innerText = filtered.length;
            filtered.forEach(item => {
                const el = document.createElement('div');
                el.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition group flex justify-between items-center";
                el.innerHTML = `<div><div class="flex items-center gap-2 mb-1"><span class="text-xs font-bold text-gray-300">#${item.id}</span><span class="text-[10px] bg-gray-100 text-gray-500 px-1 rounded uppercase">${item.type}</span></div><h3 class="text-lg font-bold text-slate-800 group-hover:text-emerald-600 transition">${item.en}</h3><p class="text-gray-500 text-sm">${item.vi}</p></div><button onclick="speak('${escapeQuote(item.en)}')" class="text-emerald-200 hover:text-emerald-500 transition"><i class="fas fa-volume-up text-lg"></i></button>`;
                grid.appendChild(el);
            });
        }
        function filterVocab() { renderVocabLines(document.getElementById('searchInput').value); }

        // FLASHCARD
        function updateFlashcard() {
            if (activeList.length === 0) return;
            const item = activeList[currentIndex];
            isFlipped = false; document.getElementById('flashcard-inner').classList.remove('flipped');
            document.getElementById('fc-index').innerText = `${currentIndex + 1} / ${activeList.length}`;
            document.getElementById('fc-front-text').innerText = item.en;
            document.getElementById('fc-back-text').innerText = item.vi;
            document.getElementById('fc-back-type').innerText = item.type;
            document.getElementById('fc-back-sent').innerText = `"${item.en} is related to healthy living."`;
            if (document.getElementById('auto-speak').checked) speak(item.en);
        }
        function flipCard() { isFlipped = !isFlipped; document.getElementById('flashcard-inner').classList.toggle('flipped', isFlipped); }
        function changeCard(dir) { currentIndex += dir; if (currentIndex < 0) currentIndex = activeList.length - 1; if (currentIndex >= activeList.length) currentIndex = 0; updateFlashcard(); }
        function toggleShuffle() { isShuffled = !isShuffled; activeList = isShuffled ? [...vocabData].sort(() => Math.random() - 0.5) : [...vocabData]; currentIndex = 0; updateFlashcard(); }
        function speakCurrentCard() { speak(activeList[currentIndex].en); }

        // STRUCTURE
        function renderStructureCard() {
            const word = vocabData[structIdx];
            const container = document.getElementById('structure-card-container');
            container.innerHTML = `<div class="bg-white rounded-xl shadow-lg p-6 max-w-2xl mx-auto animate-[fadeIn_0.3s_ease-out]"><div class="text-center mb-6"><h2 class="text-3xl font-extrabold text-slate-800 mb-1">${word.en}</h2><p class="text-gray-400 text-sm">(${word.vi})</p></div><div class="border-t border-gray-100 pt-6 text-center"><p class="font-bold text-gray-700 mb-3">Thử nói:</p><p class="text-xl font-bold text-teal-600 mb-6">"I want to avoid ${word.en}."</p><button id="record-btn" onclick="toggleRecording()" class="w-16 h-16 rounded-full bg-red-500 hover:bg-red-600 text-white shadow-lg flex items-center justify-center mx-auto transition transform active:scale-95"><i class="fas fa-microphone text-2xl"></i></button><p id="transcript-result" class="text-sm text-gray-400 mt-3 h-6 italic">Nhấn mic để nói...</p></div></div>`;
        }
        function nextStructureCard() { structIdx = (structIdx + 1) % vocabData.length; renderStructureCard(); }
        function prevStructureCard() { structIdx = (structIdx - 1 + vocabData.length) % vocabData.length; renderStructureCard(); }
        function toggleRecording() {
            if (!('webkitSpeechRecognition' in window)) { showToast("Trình duyệt không hỗ trợ"); return; }
            if (isRecording) { recognition.stop(); return; }
            const btn = document.getElementById('record-btn'); recognition = new webkitSpeechRecognition(); recognition.lang = 'en-US';
            recognition.onstart = () => { isRecording = true; btn.classList.add('pulse-ring'); document.getElementById('transcript-result').innerText = "Đang nghe..."; };
            recognition.onresult = (e) => { const text = e.results[0][0].transcript; document.getElementById('transcript-result').innerText = `"${text}"`; if (text.toLowerCase().includes(vocabData[structIdx].en.toLowerCase())) showToast("🎉 Good job!"); };
            recognition.onend = () => { isRecording = false; btn.classList.remove('pulse-ring'); };
            recognition.start();
        }

        // PRACTICE
        function switchPracticeMode(mode) {
            currentMode = mode; currentPage = 1;
            document.querySelectorAll('.prac-sub-btn').forEach(btn => {
                if (btn.onclick.toString().includes(mode)) { btn.classList.remove('bg-white', 'text-gray-600', 'border-gray-200'); btn.classList.add('bg-emerald-100', 'text-emerald-800', 'border-emerald-300'); }
                else { btn.classList.add('bg-white', 'text-gray-600', 'border-gray-200'); btn.classList.remove('bg-emerald-100', 'text-emerald-800', 'border-emerald-300'); }
            });
            renderPagination(); renderPracticePage();
        }
        function renderPagination() {
            const total = fullExercises[currentMode].length; const pages = Math.ceil(total / itemsPerPage);
            const container = document.getElementById('pagination-controls'); container.innerHTML = '';
            let startP = Math.max(1, currentPage - 2); let endP = Math.min(pages, startP + 4);
            if (endP - startP < 4) startP = Math.max(1, endP - 4);
            for (let i = startP; i <= endP; i++) { const btn = document.createElement('button'); btn.className = `px-3 py-1 rounded text-sm font-bold border transition ${i === currentPage ? 'bg-emerald-600 text-white border-emerald-600' : 'bg-white text-gray-600 hover:bg-gray-50 border-gray-200'}`; btn.innerText = i; btn.onclick = () => { currentPage = i; renderPagination(); renderPracticePage(); }; container.appendChild(btn); }
            document.getElementById('practice-stats').innerText = `Tổng số câu hỏi: ${total} | Trang ${currentPage}/${pages}`;
        }
        
        function renderPracticePage() {
            const container = document.getElementById('practice-container'); container.innerHTML = '';
            const start = (currentPage - 1) * itemsPerPage; const end = start + itemsPerPage;
            const data = fullExercises[currentMode].slice(start, end);
            const list = document.createElement('div'); list.className = "bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden";
            data.forEach((item, i) => {
                const row = document.createElement('div'); row.className = "p-4 border-b border-gray-50 flex flex-col gap-2 hover:bg-gray-50 transition last:border-0";
                row.innerHTML = `<div class="font-bold text-gray-400 text-sm mb-1">Câu ${start + i + 1}</div>`;
                
                if (currentMode === 'type1') {
                    // Type 1: Order OR Choice
                    if (item.type === 'order') {
                        const uniqueId = `order-${start+i}`;
                        row.innerHTML += `<div class="text-lg text-slate-800 font-medium mb-2">${item.question}</div><div id="ans-${uniqueId}" class="min-h-[40px] bg-sky-50 border border-dashed border-sky-300 rounded p-2 flex flex-wrap gap-2 mb-2" data-ans="${item.answer}"></div><div id="bank-${uniqueId}" class="flex flex-wrap gap-2">${item.words.map(w => `<span onclick="moveWord(this, 'ans-${uniqueId}', 'bank-${uniqueId}')" class="word-bank-item bg-white px-3 py-1 rounded shadow-sm border border-gray-200 text-gray-700 font-bold text-sm">${w}</span>`).join('')}</div><div class="prac-feedback mt-2"></div>`;
                    } else {
                        // Choice
                        row.innerHTML += `<div class="text-lg text-slate-800 font-medium mb-2">${item.question}</div><div class="grid grid-cols-2 gap-2 choice-container" data-ans="${item.answer}">${item.options.map(opt => `<button onclick="selectChoice(this)" class="p-2 border rounded-lg text-left hover:bg-emerald-50 transition text-sm text-gray-700">${opt}</button>`).join('')}</div><div class="prac-feedback mt-2"></div>`;
                    }
                } else if (currentMode === 'type2') {
                    // Type 2: Write
                    row.innerHTML += `<div class="text-lg text-slate-800 font-medium mb-2">${item.question}</div><input type="text" data-ans="${item.answer}" class="prac-input w-full p-2 border border-gray-300 rounded focus:border-emerald-500 focus:ring-1 focus:ring-emerald-200 outline-none" placeholder="Gõ câu trả lời..." autocomplete="off"><div class="prac-feedback mt-2"></div>`;
                } else {
                    // Old types (Fill, WF, Gram)
                    const qText = item.question; 
                    // No replacement logic needed here because question already contains HTML for masks in updated logic, OR we use text input below
                    // BUT for Fill/WF/Gram we updated data to have HTML in question? 
                    // Check generateExerciseData:
                    // Fill: Question has HTML spans. We need input box.
                    // Let's stick to standard layout: Question Text + Input Box
                    
                    row.innerHTML += `<div class="mb-2">${qText}</div>`;
                    row.innerHTML += `<input type="text" data-ans="${item.answer}" class="prac-input w-full p-2 border border-gray-300 rounded focus:border-emerald-500 focus:ring-1 focus:ring-emerald-200 outline-none" placeholder="Điền đáp án..." autocomplete="off"><div class="prac-feedback mt-2"></div>`;
                }
                list.appendChild(row);
            });
            container.appendChild(list);
        }

        // --- Interaction Helpers ---
        window.moveWord = function(el, targetId, originId) {
            const target = document.getElementById(targetId); const origin = document.getElementById(originId);
            if (el.parentElement.id === originId) target.appendChild(el); else origin.appendChild(el);
        }
        window.selectChoice = function(btn) { const p = btn.parentElement; p.querySelectorAll('button').forEach(b => b.classList.remove('choice-selected', 'ring-2', 'ring-emerald-300')); btn.classList.add('choice-selected', 'ring-2', 'ring-emerald-300'); p.setAttribute('data-user-choice', btn.innerText); }

        function checkCurrentPage() {
            let cor = 0; let total = 0;
            // Inputs
            document.querySelectorAll('#practice-container .prac-input').forEach(inp => { 
                total++; 
                const u = inp.value.trim().toLowerCase().replace(/[.,?!]/g, '').replace(/\s+/g, ' '); 
                const a = inp.getAttribute('data-ans').toLowerCase().replace(/[.,?!]/g, '').replace(/\s+/g, ' '); 
                const fb = inp.nextElementSibling; // div.prac-feedback
                inp.classList.remove('correct-answer', 'wrong-answer'); fb.innerHTML = ""; 
                if (u && (u===a || a.includes(u))) { inp.classList.add('correct-answer'); fb.innerHTML = `<i class="fas fa-check text-green-500"></i> Đúng!`; cor++; } 
                else { inp.classList.add('wrong-answer'); fb.innerHTML = `<span class="text-xs text-red-500">Đáp án: ${inp.getAttribute('data-ans')}</span>`; } 
            });
            // Choices
            document.querySelectorAll('.choice-container').forEach(c => { 
                total++; const u = c.getAttribute('data-user-choice'); const a = c.getAttribute('data-ans'); const fb = c.nextElementSibling; 
                if (u === a) { cor++; fb.innerHTML = `<span class="text-green-600 font-bold"><i class="fas fa-check"></i> Đúng!</span>`; } 
                else { fb.innerHTML = `<span class="text-red-500 text-sm">Sai. Đáp án: <b>${a}</b></span>`; } 
            });
            // Ordering
            document.querySelectorAll('div[id^="ans-"]').forEach(z => {
                total++; const user = Array.from(z.children).map(s => s.innerText).join(' ').trim().toLowerCase(); const ans = z.getAttribute('data-ans').toLowerCase(); const fb = z.parentElement.querySelector('.prac-feedback');
                if (user === ans) { cor++; fb.innerHTML = `<span class="text-green-600 font-bold"><i class="fas fa-check"></i> Đúng!</span>`; z.classList.add('bg-green-50', 'border-green-300'); } 
                else { fb.innerHTML = `<span class="text-red-500 text-sm">Sai. Đáp án: <b>${z.getAttribute('data-ans')}</b></span>`; z.classList.add('bg-red-50', 'border-red-300'); }
            });
            showToast(`Đúng ${cor}/${total} câu`);
        }

        function speak(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; window.speechSynthesis.speak(u); }
        function escapeQuote(s) { return s.replace(/'/g, "\\'"); }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.className = "show"; setTimeout(() => t.className = "", 3000); }
        function resetApp() { location.reload(); }
        function toggleInfo() { alert("Phiên bản Unit 2 Full: 120 từ vựng."); }
        function toggleNote() { const sb = document.getElementById('note-sidebar'); sb.classList.toggle('translate-x-full'); if(window.innerWidth > 1024) document.body.classList.toggle('note-open'); }
        function exportToWord() { const t = document.getElementById('note-area').value; if(!t)return; const b = new Blob(['\ufeff'+t],{type:'application/msword'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='Note.doc'; document.body.appendChild(a); a.click(); document.body.removeChild(a); }
    </script>
</body>
