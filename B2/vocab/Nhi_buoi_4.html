        .hidden-section {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Flashcard 3D */
        .perspective-1000 {
            perspective: 1000px;
        }

        .transform-style-3d {
            transform-style: preserve-3d;
        }

        .backface-hidden {
            backface-visibility: hidden;
        }

        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        .flipped {
            transform: rotateY(180deg);
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .flashcard-front,
        .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 1.5rem;
            background: white;
            border: 2px solid #e9d5ff;
            padding: 1.5rem;
        }

        .flashcard-front {
            background: linear-gradient(135deg, #ffffff 0%, #faf5ff 100%);
        }

        .flashcard-back {
            background: linear-gradient(135deg, #fff1f2 0%, #fff7ed 100%);
            transform: rotateY(180deg);
        }

        /* Practice Styles */
        .correct-answer {
            background-color: #f0fdf4 !important;
            border-color: #22c55e !important;
            color: #15803d !important;
        }

        .wrong-answer {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #b91c1c !important;
        }

        .choice-selected {
            background-color: #f3e8ff;
            border-color: #9333ea;
            color: #581c87;
            font-weight: bold;
        }

        /* Word Ordering Styles */
        .word-bank-item {
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .word-bank-item:hover {
            transform: translateY(-2px);
            background-color: #f3e8ff;
        }

        .word-bank-item.used {
            opacity: 0.5;
            pointer-events: none;
            background-color: #f3f4f6;
            color: #9ca3af;
            border-color: #e5e7eb;
        }

        /* Toast */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }

        /* Pulse */
        .pulse-ring {
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0% {
                transform: scale(0.95);

                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);

        // --- APP LOGIC (Optimized for 197 items) ---

            document.getElementById('header-count').innerText = vocabData.length;

            fullExercises = generateExerciseData();

        function generateExerciseData() {
            const exercises = { fill: [], wf: [], gram: [], type1: [], type2: [] };
            vocabData.forEach((word, index) => {
                const en = word.en.trim();
                const vi = word.vi.trim();
                const type = word.type ? word.type.trim().toLowerCase() : '';

                // Spelling
                let masked = en.split('').map(c => (c === ' ' || c === '/' || Math.random() > 0.4) ? c : '_').join('');
                if (!masked.includes('_')) masked = en.replace(/./, '_');
                exercises.fill.push({ id: index, word: en, question: `Spelling check: <span class="font-mono font-bold text-purple-600 text-lg tracking-widest bg-purple-50 px-2 py-1 rounded border border-purple-200">${masked}</span> <br><span class="text-xs text-gray-400 italic">Hint: ${vi}</span>`, answer: en });

                // WF
                let wfQ = type.includes('n') ? `I saw a beautiful _______ .` : type.includes('v') ? `She started to _______ .` : `The show was _______ .`;
                exercises.wf.push({ id: index, root: en, question: `<div>${wfQ}</div><div class="text-xs text-gray-400 mt-1">Hint: ${vi} (${type})</div>`, answer: en });

                // Grammar
                exercises.gram.push({ id: index, word: en, question: `Write this word: <span class="font-bold text-pink-600">${en}</span>`, answer: en });

                // Type 1 (Quiz)
                if (en.includes(' ')) {
                    exercises.type1.push({ id: index, type: 'order', question: `Reorder to form correct phrase (Nghĩa: ${vi}):`, words: en.split(' ').sort(() => Math.random() - 0.5), answer: en });
                } else {
                    const typeMap = { 'n': 'Noun', 'v': 'Verb', 'adj': 'Adjective', 'adv': 'Adverb' };
                    const correctType = typeMap[type] || 'Other/Mixed';
                    const opts = [...new Set(Object.values(typeMap))];
                    const finalOpts = opts.sort(() => 0.5 - Math.random());
                    exercises.type1.push({ id: index, type: 'choice', question: `Which category does "<span class="font-bold text-purple-600">${en}</span>" belong to?`, options: finalOpts, answer: correctType });
                }

                // Translation
                exercises.type2.push({ id: index, type: 'write', question: `Translate: "<span class="font-bold text-pink-600">${vi}</span>"`, answer: en });
            });
            return exercises;
        }

        function switchTab(tab) {

            document.getElementById(`section-${tab}`).classList.remove('hidden-section');

        function renderVocabLines(filter = "") {
            const grid = document.getElementById('vocab-grid'); grid.innerHTML = "";
            const filtered = vocabData.filter(item => item.en.toLowerCase().includes(filter.toLowerCase()) || item.vi.toLowerCase().includes(filter.toLowerCase()));
            document.getElementById('vocab-count').innerText = filtered.length;
            filtered.forEach(item => {
                const el = document.createElement('div');
                el.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition group flex justify-between items-center";

                grid.appendChild(el);
            });
        }
        function filterVocab() { renderVocabLines(document.getElementById('searchInput').value); }

        function updateFlashcard() {
            const item = activeList[currentIndex];

            if (document.getElementById('auto-speak').checked) speak(item.en);
        }
        function flipCard() { isFlipped = !isFlipped; document.getElementById('flashcard-inner').classList.toggle('flipped', isFlipped); }
        function changeCard(dir) { currentIndex += dir; if (currentIndex < 0) currentIndex = activeList.length - 1; if (currentIndex >= activeList.length) currentIndex = 0; updateFlashcard(); }
        function toggleShuffle() { isShuffled = !isShuffled; activeList = isShuffled ? [...vocabData].sort(() => Math.random() - 0.5) : [...vocabData]; currentIndex = 0; updateFlashcard(); }

        function renderStructureCard() {
            const word = vocabData[structIdx];
            const container = document.getElementById('structure-card-container');

        }
        function nextStructureCard() { structIdx = (structIdx + 1) % vocabData.length; renderStructureCard(); }
        function prevStructureCard() { structIdx = (structIdx - 1 + vocabData.length) % vocabData.length; renderStructureCard(); }
        function toggleRecording() {
            if (!('webkitSpeechRecognition' in window)) { showToast("Not supported"); return; }
            if (isRecording) { recognition.stop(); return; }
            const btn = document.getElementById('record-btn'); recognition = new webkitSpeechRecognition(); recognition.lang = 'en-US';
            recognition.onstart = () => { isRecording = true; btn.classList.add('pulse-ring'); };
            recognition.onresult = (e) => { const x = e.results[0][0].transcript; document.getElementById('transcript-result').innerText = `"${x}"`; if (x.toLowerCase().includes(vocabData[structIdx].en.toLowerCase())) showToast("🎉 Excellent!"); };
            recognition.onend = () => { isRecording = false; btn.classList.remove('pulse-ring'); };
            recognition.start();
        }

        function switchPracticeMode(mode) { currentMode = mode; currentPage = 1; renderPagination(); renderPracticePage(); }
        function renderPagination() {
            const total = fullExercises[currentMode].length; const pages = Math.ceil(total / itemsPerPage);
            const container = document.getElementById('pagination-controls'); container.innerHTML = '';
            for (let i = 1; i <= pages; i++) { if (i > 3 && i < pages - 1) { if (i === 4) container.innerHTML += '...'; continue; } const btn = document.createElement('button'); btn.className = `px-2 py-1 rounded text-xs font-bold border ${i === currentPage ? 'bg-purple-600 text-white' : 'bg-white text-gray-500'}`; btn.innerText = i; btn.onclick = () => { currentPage = i; renderPagination(); renderPracticePage(); }; container.appendChild(btn); }
            document.getElementById('practice-stats').innerText = `Page ${currentPage}/${pages}`;
        }
        function renderPracticePage() {
            const container = document.getElementById('practice-container'); container.innerHTML = '';
            const start = (currentPage - 1) * itemsPerPage; const end = start + itemsPerPage;
            const data = fullExercises[currentMode].slice(start, end);
            const list = document.createElement('div'); list.className = "bg-white rounded-xl shadow-sm";
            data.forEach((item, i) => {
                const row = document.createElement('div'); row.className = "p-4 border-b border-gray-50";
                row.innerHTML = `<div class="text-gray-300 text-[10px] uppercase font-bold text-right">#${start + i + 1}</div><div class="mb-2 font-medium">${item.question}</div>`;
                if (item.type === 'order') {
                    row.innerHTML += `<div id="ans-q-${start + i}" class="min-h-[40px] bg-purple-50 border border-dashed border-purple-200 rounded p-2 flex flex-wrap gap-1 mb-2" data-ans="${item.answer}"></div><div id="bank-q-${start + i}" class="flex flex-wrap gap-1">${item.words.map(w => `<span onclick="moveWord(this, 'ans-q-${start + i}', 'bank-q-${start + i}')" class="word-bank-item bg-white px-2 py-1 rounded border text-xs">${w}</span>`).join('')}</div>`;
                } else if (item.options) {
                    row.innerHTML += `<div class="grid grid-cols-1 gap-1" data-ans="${item.answer}">${item.options.map(o => `<button onclick="selectChoice(this)" class="p-2 border rounded-lg text-left hover:bg-purple-50 text-xs">${o}</button>`).join('')}</div>`;
                } else {
                    row.innerHTML += `<input type="text" data-ans="${item.answer}" class="prac-input w-full p-2 border border-purple-100 rounded focus:border-purple-500 outline-none text-sm" placeholder="...">`;
                }
                row.innerHTML += `<div class="prac-feedback mt-1"></div>`;
                list.appendChild(row);
            });
            container.appendChild(list);
        }

        window.moveWord = function (el, tId, oId) { const t = document.getElementById(tId); const o = document.getElementById(oId); if (el.parentElement.id === oId) t.appendChild(el); else o.appendChild(el); }
        window.selectChoice = function (btn) { const p = btn.parentElement; p.querySelectorAll('button').forEach(b => b.classList.remove('choice-selected')); btn.classList.add('choice-selected'); p.setAttribute('data-user-choice', btn.innerText); }

        function checkCurrentPage() {
            let cor = 0; let total = 0;
            document.querySelectorAll('#practice-container .prac-input').forEach(inp => {
                total++; const u = inp.value.trim().toLowerCase(); const a = inp.getAttribute('data-ans').toLowerCase(); const fb = inp.nextElementSibling;
                if (u === a) { cor++; inp.classList.add('correct-answer'); fb.innerHTML = "✅"; } else { inp.classList.add('wrong-answer'); fb.innerHTML = `❌ ${a}`; }
            });
            document.querySelectorAll('.choice-container, [data-user-choice]').forEach(c => {
                if (!c.getAttribute('data-ans')) return;
                total++; const u = c.getAttribute('data-user-choice'); const a = c.getAttribute('data-ans'); const fb = c.nextElementSibling;
                if (u === a) { cor++; fb.innerHTML = "✅"; } else { fb.innerHTML = `❌ ${a}`; }
            });
            document.querySelectorAll('div[id^="ans-q-"]').forEach(z => {
                total++; const u = Array.from(z.children).map(s => s.innerText).join(' ').trim().toLowerCase(); const a = z.getAttribute('data-ans').toLowerCase(); const fb = z.nextElementSibling.nextElementSibling;
                if (u === a) { cor++; fb.innerHTML = "✅"; } else { fb.innerHTML = `❌ ${a}`; }
            });
            showToast(`${cor}/${total} Correct!`);
        }

        function speak(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; window.speechSynthesis.speak(u); }
        function escapeQuote(s) { return s.replace(/'/g, "\\'"); }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.className = "show"; setTimeout(() => t.className = "", 3000); }
        function resetApp() { location.reload(); }
        function toggleInfo() { alert("Unit 4: Music and Arts - 197 Words."); }
        function toggleNote() { document.getElementById('note-sidebar').classList.toggle('translate-x-full'); }
        function exportToWord() { const t = document.getElementById('note-area').value; const b = new Blob(['\ufeff' + t], { type: 'application/msword' }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'Art_Notes.doc'; a.click(); }
