        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap');

        /* Base */
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0fdf4;
            overflow-x: hidden;
            transition: padding-right 0.3s ease-in-out;
        }

        /* Sidebar Push Effect */
        @media (min-width: 1024px) {
            body.note-open {
                padding-right: 20rem;
            }
        }

        /* Tabs */
        .tab-active {
            border-bottom: 3px solid #16a34a;
            color: #15803d;
            font-weight: 800;
            background-color: rgba(34, 197, 94, 0.1);
        }

        /* Utils */
        .hidden-section {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Flashcard 3D */
        .perspective-1000 {
            perspective: 1000px;
        }

        .transform-style-3d {
            transform-style: preserve-3d;
        }

        .backface-hidden {
            backface-visibility: hidden;
        }

        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        .flipped {
            transform: rotateY(180deg);
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .flashcard-front,
        .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 1.5rem;
            background: white;
            border: 2px solid #bbf7d0;
            padding: 1.5rem;
        }

        .flashcard-front {
            background: linear-gradient(135deg, #ffffff 0%, #f0fdf4 100%);
        }

        .flashcard-back {
            background: linear-gradient(135deg, #fffbeb 0%, #fff7ed 100%);
            transform: rotateY(180deg);
        }

        /* Practice Styles */
        .correct-answer {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #15803d !important;
        }

        .wrong-answer {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #b91c1c !important;
        }

        .choice-selected {
            background-color: #d1fae5;
            border-color: #16a34a;
            color: #14532d;
            font-weight: bold;
        }

        /* Word Ordering Styles */
        .word-bank-item {
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .word-bank-item:hover {
            transform: translateY(-2px);
            background-color: #dcfce7;
        }

        .word-bank-item.used {
            opacity: 0.5;
            pointer-events: none;
            background-color: #f3f4f6;
            color: #9ca3af;
            border-color: #e5e7eb;
        }

        /* Toast */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }

        /* Pulse */
        .pulse-ring {
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

            { id: 138, en: "on", vi: "ở trên", type: "prep" },

            { id: 140, en: "problem", vi: "vấn đề", type: "n" },
            { id: 141, en: "solution", vi: "giải pháp", type: "n" },
            { id: 142, en: "solve a problem", vi: "giải quyết vấn đề", type: "v" },
            { id: 143, en: "without sth/Ving", vi: "không có cái gì/không làm gì", type: "prep" },
            { id: 144, en: "preposition", vi: "giới từ", type: "n" }
        ];

        // --- APP LOGIC (Identical to Unit 2 for functional parity) ---
        let currentTab = 'vocab';
        let currentIndex = 0;
        let isFlipped = false;
        let activeList = [];
        let isShuffled = false;
        let currentMode = 'fill';
        let currentPage = 1;
        const itemsPerPage = 20;
        let fullExercises = {};
        let structIdx = 0;
        let recognition;
        let isRecording = false;

        window.onload = function () {
            document.getElementById('header-count').innerText = vocabData.length;
            activeList = [...vocabData];
            renderVocabLines();
            updateFlashcard();
            renderStructureCard();
            fullExercises = generateExerciseData();
            switchPracticeMode('fill');
        };

        function generateExerciseData() {
            const exercises = { fill: [], wf: [], gram: [], type1: [], type2: [] };
            vocabData.forEach((word, index) => {
                const en = word.en.trim();
                const vi = word.vi.trim();
                const type = word.type ? word.type.trim().toLowerCase() : '';

                // 1. Spelling
                let masked = en.split('').map(c => (c === ' ' || c === '/' || Math.random() > 0.5) ? c : '_').join('');
                if (!masked.includes('_')) masked = en.replace(/./, '_');
                exercises.fill.push({ id: index, word: en, question: `Điền ký tự còn thiếu cho: <span class="font-mono font-bold text-green-600 text-lg tracking-widest bg-green-50 px-2 py-1 rounded border border-green-200">${masked}</span> <br><span class="text-xs text-gray-500 italic mt-1">Nghĩa: ${vi}</span>`, answer: en });

                // 2. WF
                let wfQ = "";
                if (type.includes('n')) wfQ = `We should do core _______ work.`;
                else if (type.includes('v')) wfQ = `They want to _______ for kids.`;
                else if (type.includes('adj')) wfQ = `It is a _______ project.`;
                else wfQ = `Please _______ carefully.`;
                exercises.wf.push({ id: index, root: en, question: `<div>${wfQ}</div><div class="text-xs text-gray-400 mt-1">Gợi ý: ${vi} (${type})</div>`, answer: en });

                // 3. Grammar
                let gramQ = `Viết lại từ này: <span class="font-bold text-green-600">${en}</span>`;
                let gramAns = en;
                if (type.includes('n') && !en.includes(' ')) gramAns = en.endsWith('y') ? en.slice(0, -1) + "ies" : en + "s";
                exercises.gram.push({ id: index, word: en, question: gramQ, answer: gramAns });

                // 4. Type 1
                if (en.includes(' ')) {
                    exercises.type1.push({ id: index, type: 'order', question: `Sắp xếp cụm từ (Nghĩa: ${vi}):`, words: en.split(' ').sort(() => Math.random() - 0.5), answer: en });
                } else {
                    const typeMap = { 'n': 'Danh từ (Noun)', 'v': 'Động từ (Verb)', 'adj': 'Tính từ (Adjective)', 'adv': 'Trạng từ (Adverb)', 'prep': 'Giới từ (Preposition)' };
                    const correctType = typeMap[type] || 'Từ loại khác';
                    const allTypes = Object.values(typeMap);
                    const options = allTypes.filter(t => t !== correctType).sort(() => 0.5 - Math.random()).slice(0, 3);
                    options.push(correctType);
                    options.sort(() => 0.5 - Math.random());
                    exercises.type1.push({ id: index, type: 'choice', question: `Từ "<span class="font-bold text-green-600">${en}</span>" là:`, options: options, answer: correctType });
                }

                // 5. Translation
                exercises.type2.push({ id: index, type: 'write', question: `Dịch sang tiếng Anh: "<span class="font-bold text-green-600">${vi}</span>"`, answer: en });
            });
            return exercises;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('tab-active', 'bg-green-100'); b.classList.add('hover:bg-gray-50'); });
            document.getElementById(`tab-${tab}`).classList.add('tab-active', 'bg-green-100');
            document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden-section'));
            document.getElementById(`section-${tab}`).classList.remove('hidden-section');
        }

        function renderVocabLines(filter = "") {
            const grid = document.getElementById('vocab-grid'); grid.innerHTML = "";
            const filtered = vocabData.filter(item => item.en.toLowerCase().includes(filter.toLowerCase()) || item.vi.toLowerCase().includes(filter.toLowerCase()));
            document.getElementById('vocab-count').innerText = filtered.length;
            filtered.forEach(item => {
                const el = document.createElement('div');
                el.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition group flex justify-between items-center";
                el.innerHTML = `<div><div class="flex items-center gap-2 mb-1"><span class="text-xs font-bold text-gray-300">#${item.id}</span><span class="text-[10px] bg-green-50 text-green-500 px-1 rounded uppercase">${item.type}</span></div><h3 class="text-lg font-bold text-slate-800 group-hover:text-green-600 transition">${item.en}</h3><p class="text-gray-500 text-sm">${item.vi}</p></div><button onclick="speak('${escapeQuote(item.en)}')" class="text-green-200 hover:text-green-500 transition"><i class="fas fa-volume-up text-lg"></i></button>`;
                grid.appendChild(el);
            });
        }
        function filterVocab() { renderVocabLines(document.getElementById('searchInput').value); }

        function updateFlashcard() {
            if (activeList.length === 0) return;
            const item = activeList[currentIndex];
            isFlipped = false; document.getElementById('flashcard-inner').classList.remove('flipped');
            document.getElementById('fc-index').innerText = `${currentIndex + 1} / ${activeList.length}`;
            document.getElementById('fc-front-text').innerText = item.en;
            document.getElementById('fc-back-text').innerText = item.vi;
            document.getElementById('fc-back-type').innerText = item.type;
            document.getElementById('fc-back-sent').innerText = `Helping the community is a ${item.en}.`;
            if (document.getElementById('auto-speak').checked) speak(item.en);
        }
        function flipCard() { isFlipped = !isFlipped; document.getElementById('flashcard-inner').classList.toggle('flipped', isFlipped); }
        function changeCard(dir) { currentIndex += dir; if (currentIndex < 0) currentIndex = activeList.length - 1; if (currentIndex >= activeList.length) currentIndex = 0; updateFlashcard(); }
        function toggleShuffle() { isShuffled = !isShuffled; activeList = isShuffled ? [...vocabData].sort(() => Math.random() - 0.5) : [...vocabData]; currentIndex = 0; updateFlashcard(); }
        function speakCurrentCard() { speak(activeList[currentIndex].en); }

        function renderStructureCard() {
            const word = vocabData[structIdx];
            const container = document.getElementById('structure-card-container');
            container.innerHTML = `<div class="bg-white rounded-xl shadow-lg p-6 max-w-2xl mx-auto"><div class="text-center mb-6"><h2 class="text-3xl font-extrabold text-slate-800 mb-1">${word.en}</h2><p class="text-gray-400 text-sm">(${word.vi})</p></div><div class="border-t border-gray-100 pt-6 text-center"><p class="font-bold text-gray-700 mb-3">Thử nói:</p><p class="text-xl font-bold text-green-600 mb-6">"We should participate in ${word.en}."</p><button id="record-btn" onclick="toggleRecording()" class="w-16 h-16 rounded-full bg-red-500 hover:bg-red-600 text-white shadow-lg flex items-center justify-center mx-auto transition transform active:scale-95"><i class="fas fa-microphone text-2xl"></i></button><p id="transcript-result" class="text-sm text-gray-400 mt-3 h-6 italic">Nhấn mic để nói...</p></div></div>`;
        }
        function nextStructureCard() { structIdx = (structIdx + 1) % vocabData.length; renderStructureCard(); }
        function prevStructureCard() { structIdx = (structIdx - 1 + vocabData.length) % vocabData.length; renderStructureCard(); }
        function toggleRecording() {
            if (!('webkitSpeechRecognition' in window)) { showToast("Trình duyệt không hỗ trợ"); return; }
            if (isRecording) { recognition.stop(); return; }
            const btn = document.getElementById('record-btn'); recognition = new webkitSpeechRecognition(); recognition.lang = 'en-US';
            recognition.onstart = () => { isRecording = true; btn.classList.add('pulse-ring'); document.getElementById('transcript-result').innerText = "Đang nghe..."; };
            recognition.onresult = (e) => { const text = e.results[0][0].transcript; document.getElementById('transcript-result').innerText = `"${text}"`; if (text.toLowerCase().includes(vocabData[structIdx].en.toLowerCase())) showToast("🎉 Tuyệt vời!"); };
            recognition.onend = () => { isRecording = false; btn.classList.remove('pulse-ring'); };
            recognition.start();
        }

        function switchPracticeMode(mode) {
            currentMode = mode; currentPage = 1;
            document.querySelectorAll('.prac-sub-btn').forEach(btn => {
                if (btn.onclick.toString().includes(mode)) btn.classList.add('bg-green-100', 'text-green-800', 'border-green-300');
                else btn.classList.remove('bg-green-100', 'text-green-800', 'border-green-300');
            });
            renderPagination(); renderPracticePage();
        }
        function renderPagination() {
            const total = fullExercises[currentMode].length; const pages = Math.ceil(total / itemsPerPage);
            const container = document.getElementById('pagination-controls'); container.innerHTML = '';
            for (let i = 1; i <= pages; i++) { if (i > 5 && i < pages) { if (i === 6) container.innerHTML += '...'; continue; } const btn = document.createElement('button'); btn.className = `px-3 py-1 rounded text-sm font-bold border ${i === currentPage ? 'bg-green-600 text-white border-green-600' : 'bg-white text-gray-600 border-gray-200'}`; btn.innerText = i; btn.onclick = () => { currentPage = i; renderPagination(); renderPracticePage(); }; container.appendChild(btn); }
            document.getElementById('practice-stats').innerText = `Trang ${currentPage}/${pages}`;
        }
        function renderPracticePage() {
            const container = document.getElementById('practice-container'); container.innerHTML = '';
            const start = (currentPage - 1) * itemsPerPage; const end = start + itemsPerPage;
            const data = fullExercises[currentMode].slice(start, end);
            const list = document.createElement('div'); list.className = "bg-white rounded-xl shadow-sm border border-gray-100";
            data.forEach((item, i) => {
                const row = document.createElement('div'); row.className = "p-4 border-b border-gray-50 flex flex-col gap-2";
                row.innerHTML = `<div class="font-bold text-gray-400 text-xs text-right">#${start + i + 1}</div><div class="mb-2">${item.question}</div>`;
                if (item.type === 'order') {
                    row.innerHTML += `<div id="ans-order-${start + i}" class="min-h-[40px] bg-green-50 border border-dashed border-green-300 rounded p-2 flex flex-wrap gap-2 mb-2" data-ans="${item.answer}"></div><div id="bank-order-${start + i}" class="flex flex-wrap gap-2">${item.words.map(w => `<span onclick="moveWord(this, 'ans-order-${start + i}', 'bank-order-${start + i}')" class="word-bank-item bg-white px-3 py-1 rounded shadow-sm border border-gray-200 text-xs">${w}</span>`).join('')}</div>`;
                } else if (item.options) {
                    row.innerHTML += `<div class="grid grid-cols-1 md:grid-cols-2 gap-2 choice-container" data-ans="${item.answer}">${item.options.map(opt => `<button onclick="selectChoice(this)" class="p-2 border rounded-lg text-left hover:bg-green-50 text-sm transition">${opt}</button>`).join('')}</div>`;
                } else {
                    row.innerHTML += `<input type="text" data-ans="${item.answer}" class="prac-input w-full p-2 border border-gray-300 rounded focus:border-green-500 outline-none" placeholder="Nhập đáp án...">`;
                }
                row.innerHTML += `<div class="prac-feedback mt-1"></div>`;
                list.appendChild(row);
            });
            container.appendChild(list);
        }

        window.moveWord = function (el, tId, oId) { const t = document.getElementById(tId); const o = document.getElementById(oId); if (el.parentElement.id === oId) t.appendChild(el); else o.appendChild(el); }
        window.selectChoice = function (btn) { const p = btn.parentElement; p.querySelectorAll('button').forEach(b => b.classList.remove('choice-selected')); btn.classList.add('choice-selected'); p.setAttribute('data-user-choice', btn.innerText); }

        function checkCurrentPage() {
            let cor = 0; let total = 0;
            document.querySelectorAll('#practice-container .prac-input').forEach(inp => {
                total++; const u = inp.value.trim().toLowerCase(); const a = inp.getAttribute('data-ans').toLowerCase(); const fb = inp.nextElementSibling;
                if (u === a) { cor++; inp.classList.add('correct-answer'); fb.innerHTML = "<span class='text-green-600'>Đúng!</span>"; }
                else { inp.classList.add('wrong-answer'); fb.innerHTML = `<span class='text-red-500'>Đúng là: ${a}</span>`; }
            });
            document.querySelectorAll('.choice-container').forEach(c => {
                total++; const u = c.getAttribute('data-user-choice'); const a = c.getAttribute('data-ans'); const fb = c.nextElementSibling;
                if (u === a) { cor++; fb.innerHTML = "<span class='text-green-600 font-bold'>Đúng!</span>"; } else { fb.innerHTML = `<span class='text-red-500'>Sai. Đáp án: ${a}</span>`; }
            });
            document.querySelectorAll('div[id^="ans-order-"]').forEach(z => {
                total++; const u = Array.from(z.children).map(s => s.innerText).join(' ').trim().toLowerCase(); const a = z.getAttribute('data-ans').toLowerCase(); const fb = z.nextElementSibling.nextElementSibling;
                if (u === a) { cor++; fb.innerHTML = "<span class='text-green-600 font-bold'>Đúng!</span>"; } else { fb.innerHTML = `<span class='text-red-500'>Sai rùi: ${a}</span>`; }
            });
            showToast(`Kết quả: ${cor}/${total}`);
        }

        function speak(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; window.speechSynthesis.speak(u); }
        function escapeQuote(s) { return s.replace(/'/g, "\\'"); }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.className = "show"; setTimeout(() => t.className = "", 3000); }
        function resetApp() { location.reload(); }
        function toggleInfo() { alert("Unit 3: Community Service - 144 từ vựng."); }
        function toggleNote() { document.getElementById('note-sidebar').classList.toggle('translate-x-full'); }
        function exportToWord() { const t = document.getElementById('note-area').value; const b = new Blob(['\ufeff' + t], { type: 'application/msword' }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'Note_Unit3.doc'; a.click(); }
    </script>
