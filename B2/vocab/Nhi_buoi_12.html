    <style>
        /* Base */
        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #020617;

            transition: padding-right 0.3s ease-in-out;
            color: #f1f5f9;
        }

        h1,
        h2,
        h3 {
            font-family: 'Crimson Pro', serif;
        }

        /* Sidebar Push Effect */
        @media (min-width: 1024px) {
            body.note-open {
                padding-right: 20rem;
            }
        }

        /* Tabs */
        .tab-active {
            border-bottom: 3px solid #fb923c;
            color: #fb923c;
            font-weight: 800;
            background-color: rgba(251, 146, 60, 0.1);
        }

        /* Utils */
        .hidden-section {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Flashcard 3D */
        .perspective-1000 {
            perspective: 1000px;
        }

        .transform-style-3d {
            transform-style: preserve-3d;
        }

        .backface-hidden {
            backface-visibility: hidden;
        }

        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        .flipped {
            transform: rotateY(180deg);
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 1.5rem;
            box-shadow: 0 0 30px rgba(251, 146, 60, 0.1);
        }

        .flashcard-front,
        .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 1.5rem;
            background: #0f172a;
            border: 2px solid #1e293b;
            padding: 1.5rem;
        }

        .flashcard-front {
            background: linear-gradient(135deg, #1e1b4b 0%, #020617 100%);
        }

        .flashcard-back {
            background: linear-gradient(135deg, #312e81 0%, #020617 100%);
            transform: rotateY(180deg);
        }

        /* Practice Styles */
        .correct-answer {
            background-color: #064e3b !important;
            border-color: #10b981 !important;
            color: #34d399 !important;
        }

        .wrong-answer {
            background-color: #7f1d1d !important;
            border-color: #ef4444 !important;
            color: #fca5a5 !important;
        }

        .choice-selected {
            background-color: #431407;
            border-color: #fb923c;
            color: #ffedd5;
            font-weight: bold;
        }

        /* Word Ordering Styles */
        .word-bank-item {
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .word-bank-item:hover {
            transform: translateY(-2px);
            background-color: #1e293b;
            border-color: #fb923c;
        }

        .word-bank-item.used {
            opacity: 0.5;
            pointer-events: none;
            background-color: #020617;
            color: #334155;
            border-color: #0f172a;
        }

        /* Toast */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #c2410c;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }

        /* Pulse */
        .pulse-ring {
            box-shadow: 0 0 0 0 rgba(251, 146, 60, 0.7);
            animation: pulse-gold 1.5s infinite;
        }

        @keyframes pulse-gold {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(251, 146, 60, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(251, 146, 60, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(251, 146, 60, 0);
            }
        }

        .travel-card {
            background: #0f172a;
            border: 1px solid #1e293b;
            transition: all 0.3s;
        }

        .travel-card:hover {
            border-color: #fb923c;
            transform: translateY(-2px);
        }

</head>

        function generateExerciseData() {
            const exercises = { fill: [], wf: [], gram: [], type1: [], type2: [] };
            vocabData.forEach((word, index) => {
                const en = word.en.trim();
                const vi = word.vi.trim();
                const type = word.type ? word.type.trim().toLowerCase() : '';

                // Spelling
                let masked = en.split('').map(c => (c === ' ' || c === '/' || Math.random() > 0.5) ? c : '_').join('');
                if (!masked.includes('_')) masked = en.replace(/./, '_');
                exercises.fill.push({ id: index, word: en, question: `Spelling Destination: <span class="font-mono font-bold text-orange-400 text-lg tracking-widest bg-slate-950 px-2 py-1 rounded border border-orange-900/30">${masked}</span> <br><span class="text-xs text-orange-300 italic">Landmark: ${vi}</span>`, answer: en });

                // WF
                let wfQ = type.includes('n') ? `The _______ of this country is unique.` : type.includes('v') ? `We should _______ our national heritage.` : `This place is _______ .`;
                exercises.wf.push({ id: index, root: en, question: `<div>${wfQ}</div><div class="text-[10px] text-orange-900 mt-1 uppercase">Hint: ${vi} (${type})</div>`, answer: en });

                // Grammar - Focus on word families (amaze/amazing)
                if (en === 'amaze' || en === 'amazing' || en === 'amazement' || en === 'amazed') {
                    exercises.gram.push({ id: index, word: en, question: `Choose word form: I was _______ (amaze) at the view.`, answer: 'amazed' });
                } else if (type.includes('adj')) {
                    exercises.gram.push({ id: index, word: en, question: `Fill adj: Australia is an _______ (awesome) place.`, answer: 'awesome' });
                } else {
                    exercises.gram.push({ id: index, word: en, question: `World Data: <span class="font-bold text-orange-400">${en}</span>`, answer: en });
                }

                // Type 1 (Multiple Choice)
                if (en.includes(' ')) {
                    exercises.type1.push({ id: index, type: 'order', question: `Re-map Landmark (Nghĩa: ${vi}):`, words: en.split(' ').sort(() => Math.random() - 0.5), answer: en });
                } else {
                    const typeMap = { 'n': 'Noun', 'v': 'Verb', 'adj': 'Adjective', 'adv': 'Adverb' };
                    const correctType = typeMap[type] || 'Other';
                    const opts = [...new Set(Object.values(typeMap))].sort(() => 0.5 - Math.random());
                    exercises.type1.push({ id: index, type: 'choice', question: `"<span class="font-bold text-slate-100">${en}</span>" classification:`, options: opts, answer: correctType });
                }

                // Type 2 (Translation)
                exercises.type2.push({ id: index, type: 'write', question: `Translate Heritage: "<span class="font-bold text-orange-400">${vi}</span>"`, answer: en });
            });
            return exercises;
        }

        function toggleRecording() {
            if (!('webkitSpeechRecognition' in window)) { showToast("Vocal error"); return; }
            if (isRecording) { recognition.stop(); return; }
            const btn = document.getElementById('record-btn'); recognition = new webkitSpeechRecognition(); recognition.lang = 'en-US';
            recognition.onstart = () => { isRecording = true; btn.classList.add('pulse-ring'); document.getElementById('transcript-result').innerText = "IDENTIFYING..."; };
            recognition.onresult = (e) => { const x = e.results[0][0].transcript; document.getElementById('transcript-result').innerText = `MATCH: "${x}"`; if (x.toLowerCase().includes(vocabData[structIdx].en.toLowerCase())) showToast("🌍 Landmark Verified!"); };

            container.appendChild(list);
        }

        window.moveWord = function (el, tId, oId) { const t = document.getElementById(tId); const o = document.getElementById(oId); if (el.parentElement.id === oId) t.appendChild(el); else o.appendChild(el); }
        window.selectChoice = function (btn) { const p = btn.parentElement; p.querySelectorAll('button').forEach(b => b.classList.remove('choice-selected')); btn.classList.add('choice-selected'); p.setAttribute('data-user-choice', btn.innerText); }

        function checkCurrentPage() {
            let cor = 0; let total = 0;
            document.querySelectorAll('#practice-container .prac-input').forEach(inp => {
                total++; const u = inp.value.trim().toLowerCase(); const a = inp.getAttribute('data-ans').toLowerCase(); const fb = inp.nextElementSibling;
                if (u === a) { cor++; inp.classList.add('correct-answer'); fb.innerHTML = "<span class='text-orange-400'>[VERIFIED]</span>"; } else { inp.classList.add('wrong-answer'); fb.innerHTML = `<span class='text-red-500'>[REJECTED: ${a}]</span>`; }
            });
            document.querySelectorAll('#practice-container div[data-ans]').forEach(c => {
                if (!c.getAttribute('data-ans')) return;
                total++; const u = c.getAttribute('data-user-choice'); const a = c.getAttribute('data-ans'); const fb = c.nextElementSibling;
                if (!u) return;
                if (u === a) { cor++; fb.innerHTML = "<span class='text-orange-400'>[VERIFIED]</span>"; } else { fb.innerHTML = `<span class='text-red-500'>[REJECTED: ${a}]</span>`; }
            });
            document.querySelectorAll('div[id^="ans-q-"]').forEach(z => {
                total++; const u = Array.from(z.children).map(s => s.innerText).join(' ').trim().toLowerCase(); const a = z.getAttribute('data-ans').toLowerCase(); const fb = z.nextElementSibling.nextElementSibling;
                if (u === a) { cor++; fb.innerHTML = "<span class='text-orange-400'>[VERIFIED]</span>"; } else { fb.innerHTML = `<span class='text-red-500'>[REJECTED: ${a}]</span>`; }
            });
            showToast(`PROGRESS: ${cor}/${total} POINTS`);
        }

        function speak(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; window.speechSynthesis.speak(u); }
        function escapeQuote(s) { return s.replace(/'/g, "\\'"); }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.className = "show"; setTimeout(() => t.className = "", 3000); }
        function resetApp() { location.reload(); }
        function toggleInfo() { alert("Unit 12: English-speaking countries Global Stream - 204 Items."); }
        function toggleNote() { document.getElementById('note-sidebar').classList.toggle('translate-x-full'); }
        function exportToWord() { const t = document.getElementById('note-area').value; const b = new Blob(['\ufeff' + t], { type: 'application/msword' }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'WorldExplorerJournal.doc'; a.click(); }
    </script>
</body>
