        /* Base */

            background-color: #0f172a;
            overflow-x: hidden;
            transition: padding-right 0.3s ease-in-out;
            color: #f1f5f9;
        }

        /* Sidebar Push Effect */
        @media (min-width: 1024px) {
            body.note-open {
                padding-right: 20rem;
            }
        }

        /* Tabs */
        .tab-active {
            border-bottom: 3px solid #8b5cf6;
            color: #a78bfa;
            font-weight: 800;
            background-color: rgba(139, 92, 246, 0.1);
        }

        /* Utils */
        .hidden-section {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Flashcard 3D */
        .perspective-1000 {
            perspective: 1000px;
        }

        .transform-style-3d {
            transform-style: preserve-3d;
        }

        .backface-hidden {
            backface-visibility: hidden;
        }

        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        .flipped {
            transform: rotateY(180deg);
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .flashcard-front,
        .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 1.5rem;
            background: #1e293b;
            border: 2px solid #334155;
            padding: 1.5rem;
        }

        .flashcard-front {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        .flashcard-back {
            background: linear-gradient(135deg, #4c1d95 0%, #1e1b4b 100%);
            transform: rotateY(180deg);
        }

        /* Practice Styles */
        .correct-answer {
            background-color: #064e3b !important;
            border-color: #10b981 !important;
            color: #34d399 !important;
        }

        .wrong-answer {
            background-color: #7f1d1d !important;
            border-color: #ef4444 !important;
            color: #fca5a5 !important;
        }

        .choice-selected {
            background-color: #334155;
            border-color: #8b5cf6;
            color: #c084fc;
            font-weight: bold;
        }

        /* Word Ordering Styles */
        .word-bank-item {
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .word-bank-item:hover {
            transform: translateY(-2px);
            background-color: #334155;
        }

        .word-bank-item.used {
            opacity: 0.5;
            pointer-events: none;
            background-color: #0f172a;
            color: #475569;
            border-color: #1e293b;
        }

        /* Toast */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #8b5cf6;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }

        /* Pulse */
        .pulse-ring {
            box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.7);
            animation: pulse-purple 1.5s infinite;
        }

        @keyframes pulse-purple {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(139, 92, 246, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(139, 92, 246, 0);
            }
        }

        .dark-card {
            background: #1e293b;
            border: 1px solid #334155;
        }

        // --- APP LOGIC ---
        let currentTab = 'vocab';

        window.onload = function () {

        function generateExerciseData() {
            const exercises = { fill: [], wf: [], gram: [], type1: [], type2: [] };
            vocabData.forEach((word, index) => {
                const en = word.en.trim();
                const vi = word.vi.trim();
                const type = word.type ? word.type.trim().toLowerCase() : '';

                // Spelling
                let masked = en.split('').map(c => (c === ' ' || c === '/' || Math.random() > 0.5) ? c : '_').join('');
                if (!masked.includes('_')) masked = en.replace(/./, '_');
                exercises.fill.push({ id: index, word: en, question: `Spelling: <span class="font-mono font-bold text-purple-400 text-lg tracking-widest bg-slate-800 px-2 py-1 rounded border border-slate-700">${masked}</span> <br><span class="text-xs text-gray-500 italic">Hint: ${vi}</span>`, answer: en });

                // WF
                let wfQ = type.includes('v') ? `The director _______ the movie yesterday.` : type.includes('adj') ? `The horror movie was very _______ .` : `This is a great _______ .`;
                exercises.wf.push({ id: index, root: en, question: `<div>${wfQ}</div><div class="text-xs text-gray-500 mt-1">Gợi ý: ${vi} (${type})</div>`, answer: en });

                // Grammar - Focus on connectors or -ed/-ing adjectives
                if (en.toLowerCase() === 'although' || en.toLowerCase() === 'however') {
                    exercises.gram.push({ id: index, word: en, question: `Fill: _______ the film was short, it was very moving. (Although / However)`, answer: 'Although' });
                } else if (en.includes('ing') || en.includes('ed')) {
                    exercises.gram.push({ id: index, word: en, question: `Choose: The movie was _______ (excite/exciting/excited).`, answer: 'exciting' });
                } else {
                    exercises.gram.push({ id: index, word: en, question: `Write the correct word: <span class="font-bold text-purple-400">${en}</span>`, answer: en });
                }

                // Type 1 (Multiple Choice)
                if (en.includes(' ')) {
                    exercises.type1.push({ id: index, type: 'order', question: `Reorder to form phrase (Nghĩa: ${vi}):`, words: en.split(' ').sort(() => Math.random() - 0.5), answer: en });
                } else {
                    const typeMap = { 'n': 'Noun', 'v': 'Verb', 'adj': 'Adjective', 'adv': 'Adverb' };
                    const correctType = typeMap[type] || 'Other';
                    const opts = [...new Set(Object.values(typeMap))].sort(() => 0.5 - Math.random());
                    exercises.type1.push({ id: index, type: 'choice', question: `"<span class="font-bold text-slate-100">${en}</span>" is a:`, options: opts, answer: correctType });
                }

                // Type 2 (Translation)
                exercises.type2.push({ id: index, type: 'write', question: `Dịch sang tiếng Anh: "<span class="font-bold text-purple-400">${vi}</span>"`, answer: en });
            });
            return exercises;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active', 'bg-slate-800'));

            document.getElementById(`section-${tab}`).classList.remove('hidden-section');
        }

        function renderVocabLines(filter = "") {
            const grid = document.getElementById('vocab-grid'); grid.innerHTML = "";
            const filtered = vocabData.filter(item => item.en.toLowerCase().includes(filter.toLowerCase()) || item.vi.toLowerCase().includes(filter.toLowerCase()));
            document.getElementById('vocab-count').innerText = filtered.length;
            filtered.forEach(item => {
                const el = document.createElement('div');
                el.className = "dark-card p-4 rounded-xl shadow-sm hover:shadow-md transition group flex justify-between items-center";
                el.innerHTML = `<div><div class="flex items-center gap-2 mb-1"><span class="text-xs font-bold text-slate-600">#${item.id}</span><span class="text-[10px] bg-purple-900/30 text-purple-400 px-1 rounded uppercase font-bold">${item.type}</span></div><h3 class="text-lg font-bold text-white group-hover:text-purple-400 transition">${item.en}</h3><p class="text-slate-400 text-sm">${item.vi}</p></div><button onclick="speak('${escapeQuote(item.en)}')" class="text-slate-600 hover:text-purple-400 transition"><i class="fas fa-volume-up text-lg"></i></button>`;
                grid.appendChild(el);
            });
        }
        function filterVocab() { renderVocabLines(document.getElementById('searchInput').value); }

        function updateFlashcard() {
            const item = activeList[currentIndex];

            document.getElementById('fc-front-text').innerText = item.en;
            document.getElementById('fc-back-text').innerText = item.vi;
            document.getElementById('fc-back-type').innerText = item.type;
            document.getElementById('fc-back-sent').innerText = `I found the ${item.en} very entertaining.`;
            if (document.getElementById('auto-speak').checked) speak(item.en);
        }
        function flipCard() { isFlipped = !isFlipped; document.getElementById('flashcard-inner').classList.toggle('flipped', isFlipped); }
        function changeCard(dir) { currentIndex += dir; if (currentIndex < 0) currentIndex = activeList.length - 1; if (currentIndex >= activeList.length) currentIndex = 0; updateFlashcard(); }
        function toggleShuffle() { isShuffled = !isShuffled; activeList = isShuffled ? [...vocabData].sort(() => Math.random() - 0.5) : [...vocabData]; currentIndex = 0; updateFlashcard(); }
        function speakCurrentCard() { speak(activeList[currentIndex].en); }

        function renderStructureCard() {
            const word = vocabData[structIdx];
            const container = document.getElementById('structure-card-container');
            container.innerHTML = `<div class="dark-card rounded-xl shadow-lg p-6 max-w-2xl mx-auto"><div class="text-center mb-6"><h2 class="text-3xl font-extrabold text-white mb-1">${word.en}</h2><p class="text-slate-400 text-sm">(${word.vi})</p></div><div class="border-t border-slate-700 pt-6 text-center"><p class="font-bold text-slate-400 mb-3">Thử nói:</p><p class="text-xl font-bold text-purple-400 mb-6 font-serif">"Although I was tired, I went to see the ${word.en}."</p><button id="record-btn" onclick="toggleRecording()" class="w-16 h-16 rounded-full bg-purple-600 hover:bg-purple-700 text-white shadow-lg flex items-center justify-center mx-auto transition transform active:scale-95"><i class="fas fa-microphone text-2xl"></i></button><p id="transcript-result" class="text-sm text-slate-500 mt-3 h-6 italic">Nhấn mic để nói...</p></div></div>`;
        }
        function nextStructureCard() { structIdx = (structIdx + 1) % vocabData.length; renderStructureCard(); }
        function prevStructureCard() { structIdx = (structIdx - 1 + vocabData.length) % vocabData.length; renderStructureCard(); }
        function toggleRecording() {
            if (!('webkitSpeechRecognition' in window)) { showToast("Not supported"); return; }
            if (isRecording) { recognition.stop(); return; }
            const btn = document.getElementById('record-btn'); recognition = new webkitSpeechRecognition(); recognition.lang = 'en-US';
            recognition.onstart = () => { isRecording = true; btn.classList.add('pulse-ring'); document.getElementById('transcript-result').innerText = "Đang nghe..."; };
            recognition.onresult = (e) => { const x = e.results[0][0].transcript; document.getElementById('transcript-result').innerText = `"${x}"`; if (x.toLowerCase().includes(vocabData[structIdx].en.toLowerCase())) showToast("🎉 Star Performance!"); };
            recognition.onend = () => { isRecording = false; btn.classList.remove('pulse-ring'); };
            recognition.start();
        }

        function switchPracticeMode(mode) { currentMode = mode; currentPage = 1; renderPagination(); renderPracticePage(); }
        function renderPagination() {
            const total = fullExercises[currentMode].length; const pages = Math.ceil(total / itemsPerPage);
            const container = document.getElementById('pagination-controls'); container.innerHTML = '';
            for (let i = 1; i <= pages; i++) { if (i > 3 && i < pages - 1) { if (i === 4) container.innerHTML += '...'; continue; } const btn = document.createElement('button'); btn.className = `px-3 py-1 rounded text-sm font-bold border transition ${i === currentPage ? 'bg-purple-600 text-white border-purple-600' : 'bg-slate-800 text-slate-400 hover:bg-slate-700 border-slate-700'}`; btn.innerText = i; btn.onclick = () => { currentPage = i; renderPagination(); renderPracticePage(); }; container.appendChild(btn); }
            document.getElementById('practice-stats').innerText = `Trang ${currentPage}/${pages}`;
        }
        function renderPracticePage() {
            const container = document.getElementById('practice-container'); container.innerHTML = '';
            const start = (currentPage - 1) * itemsPerPage; const end = start + itemsPerPage;
            const data = fullExercises[currentMode].slice(start, end);
            const list = document.createElement('div'); list.className = "dark-card rounded-xl shadow-sm border border-slate-700";
            data.forEach((item, i) => {
                const row = document.createElement('div'); row.className = "p-4 border-b border-slate-800 flex flex-col gap-2";
                row.innerHTML = `<div class="text-[10px] uppercase text-slate-600 font-bold text-right">#${start + i + 1}</div><div class="mb-2 font-medium text-slate-200">${item.question}</div>`;
                if (item.type === 'order') {
                    row.innerHTML += `<div id="ans-q-${start + i}" class="min-h-[40px] bg-slate-900 border border-dashed border-slate-700 rounded p-2 flex flex-wrap gap-2 mb-2" data-ans="${item.answer}"></div><div id="bank-q-${start + i}" class="flex flex-wrap gap-2">${item.words.map(w => `<span onclick="moveWord(this, 'ans-q-${start + i}', 'bank-q-${start + i}')" class="word-bank-item bg-slate-800 px-2 py-1 rounded border border-slate-700 text-xs shadow-sm">${w}</span>`).join('')}</div>`;
                } else if (item.options) {
                    row.innerHTML += `<div class="grid grid-cols-1 md:grid-cols-2 gap-2" data-ans="${item.answer}">${item.options.map(o => `<button onclick="selectChoice(this)" class="p-2 border border-slate-700 rounded-lg text-left hover:bg-slate-800 text-sm transition">${o}</button>`).join('')}</div>`;
                } else {
                    row.innerHTML += `<input type="text" data-ans="${item.answer}" class="prac-input w-full p-2 bg-slate-900 border border-slate-700 rounded focus:border-purple-500 outline-none text-sm text-slate-100" placeholder="...">`;
                }
                row.innerHTML += `<div class="prac-feedback mt-1 font-bold"></div>`;
                list.appendChild(row);
            });
            container.appendChild(list);
        }

        window.moveWord = function (el, tId, oId) { const t = document.getElementById(tId); const o = document.getElementById(oId); if (el.parentElement.id === oId) t.appendChild(el); else o.appendChild(el); }
        window.selectChoice = function (btn) { const p = btn.parentElement; p.querySelectorAll('button').forEach(b => b.classList.remove('choice-selected')); btn.classList.add('choice-selected'); p.setAttribute('data-user-choice', btn.innerText); }

        function checkCurrentPage() {
            let cor = 0; let total = 0;
            document.querySelectorAll('#practice-container .prac-input').forEach(inp => {
                total++; const u = inp.value.trim().toLowerCase(); const a = inp.getAttribute('data-ans').toLowerCase(); const fb = inp.nextElementSibling;
                if (u === a) { cor++; inp.classList.add('correct-answer'); fb.innerHTML = "<span class='text-green-400'>✅ Correct!</span>"; } else { inp.classList.add('wrong-answer'); fb.innerHTML = `<span class='text-red-400'>❌ ${a}</span>`; }
            });
            document.querySelectorAll('#practice-container div[data-ans]').forEach(c => {
                if (!c.getAttribute('data-ans')) return;
                total++; const u = c.getAttribute('data-user-choice'); const a = c.getAttribute('data-ans'); const fb = c.nextElementSibling;
                if (!u) return;
                if (u === a) { cor++; fb.innerHTML = "<span class='text-green-400'>✅ Correct!</span>"; } else { fb.innerHTML = `<span class='text-red-400'>❌ ${a}</span>`; }
            });
            document.querySelectorAll('div[id^="ans-q-"]').forEach(z => {
                total++; const u = Array.from(z.children).map(s => s.innerText).join(' ').trim().toLowerCase(); const a = z.getAttribute('data-ans').toLowerCase(); const fb = z.nextElementSibling.nextElementSibling;
                if (u === a) { cor++; fb.innerHTML = "<span class='text-green-400'>✅ Correct!</span>"; } else { fb.innerHTML = `<span class='text-red-400'>❌ ${a}</span>`; }
            });
            showToast(`${cor}/${total} Correct!`);
        }

        function speak(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; window.speechSynthesis.speak(u); }
        function escapeQuote(s) { return s.replace(/'/g, "\\'"); }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.className = "show"; setTimeout(() => t.className = "", 3000); }
        function resetApp() { location.reload(); }
        function toggleInfo() { alert("Unit 8: Films - 171 Words."); }
        function toggleNote() { document.getElementById('note-sidebar').classList.toggle('translate-x-full'); }
        function exportToWord() { const t = document.getElementById('note-area').value; const b = new Blob(['\ufeff' + t], { type: 'application/msword' }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'FilmUnitNotes.doc'; a.click(); }
