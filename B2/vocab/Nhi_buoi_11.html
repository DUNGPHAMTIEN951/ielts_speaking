    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

        /* Base */
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #020617;
            overflow-x: hidden;
            transition: padding-right 0.3s ease-in-out;
            color: #e2e8f0;
        }

        /* Sidebar Push Effect */
        @media (min-width: 1024px) {
            body.note-open {
                padding-right: 20rem;
            }
        }

        /* Tabs */
        .tab-active {
            border-bottom: 3px solid #06b6d4;
            color: #67e8f9;
            font-weight: 800;
            background-color: rgba(6, 182, 212, 0.1);
        }

        /* Utils */
        .hidden-section {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Flashcard 3D */
        .perspective-1000 {
            perspective: 1000px;
        }

        .transform-style-3d {
            transform-style: preserve-3d;
        }

        .backface-hidden {
            backface-visibility: hidden;
        }

        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        .flipped {
            transform: rotateY(180deg);
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 1.5rem;
            box-shadow: 0 0 40px rgba(6, 182, 212, 0.2);
        }

        .flashcard-front,
        .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 1.5rem;
            background: #0f172a;
            border: 2px solid #1e293b;
            padding: 1.5rem;
        }

        .flashcard-front {
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
        }

        .flashcard-back {
            background: linear-gradient(135deg, #0e1e3b 0%, #020617 100%);
            transform: rotateY(180deg);
        }

        /* Practice Styles */
        .correct-answer {
            background-color: #064e3b !important;
            border-color: #10b981 !important;
            color: #34d399 !important;
        }

        .wrong-answer {
            background-color: #7f1d1d !important;
            border-color: #ef4444 !important;
            color: #fca5a5 !important;
        }

        .choice-selected {
            background-color: #164e63;
            border-color: #06b6d4;
            color: #cffafe;
            font-weight: bold;
        }

        /* Word Ordering Styles */
        .word-bank-item {
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .word-bank-item:hover {
            transform: translateY(-2px);
            background-color: #1e293b;
            border-color: #06b6d4;
        }

        .word-bank-item.used {
            opacity: 0.5;
            pointer-events: none;
            background-color: #020617;
            color: #334155;
            border-color: #0f172a;
        }

        /* Toast */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #06b6d4;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }

        /* Cyber Pulse */
        .pulse-ring {
            box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.7);
            animation: pulse-cyber 1.5s infinite;
        }

        @keyframes pulse-cyber {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(6, 182, 212, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(6, 182, 212, 0);
            }
        }

        .dark-card {
            background: #0f172a;
            border: 1px solid #1e293b;
            transition: all 0.3s;
        }

        .dark-card:hover {
            border-color: #06b6d4;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.1);
        }

        .scifi-btn {
            background: linear-gradient(90deg, #0891b2 0%, #0e7490 100%);
            box-shadow: 0 4px 14px 0 rgba(6, 182, 212, 0.39);
        }
    </style>
</head>

        function generateExerciseData() {
            const exercises = { fill: [], wf: [], gram: [], type1: [], type2: [] };
            vocabData.forEach((word, index) => {
                const en = word.en.trim();
                const vi = word.vi.trim();
                const type = word.type ? word.type.trim().toLowerCase() : '';

                // Spelling
                let masked = en.split('').map(c => (c === ' ' || c === '/' || Math.random() > 0.6) ? c : '_').join('');
                if (!masked.includes('_')) masked = en.replace(/./, '_');
                exercises.fill.push({ id: index, word: en, question: `Neural Input required: <span class="font-mono font-bold text-cyan-400 text-lg tracking-widest bg-slate-900 px-2 py-1 rounded border border-cyan-800/30">${masked}</span> <br><span class="text-[10px] text-cyan-600 italic uppercase">Signal: ${vi}</span>`, answer: en });

                // WF
                let wfQ = type.includes('n') ? `This _______ will change our lives.` : type.includes('v') ? `We will _______ to other planets.` : `It is very _______ .`;
                exercises.wf.push({ id: index, root: en, question: `<div>${wfQ}</div><div class="text-[10px] text-cyan-700 mt-1 uppercase">Root: ${vi} (${type})</div>`, answer: en });

                // Grammar - Focus on will/pronouns
                if (en.toLowerCase() === 'mine' || en.toLowerCase() === 'yours' || en.toLowerCase() === 'theirs') {
                    exercises.gram.push({ id: index, word: en, question: `Replace: This is my car. -> This car is _______ .`, answer: en });
                } else if (en.includes('future')) {
                    exercises.gram.push({ id: index, word: en, question: `Next year, we _______ (travel) by car.`, answer: 'will travel' });
                } else {
                    exercises.gram.push({ id: index, word: en, question: `Data Validation: <span class="font-bold text-cyan-400">${en}</span>`, answer: en });
                }

                // Type 1 (Multiple Choice)
                if (en.includes(' ')) {
                    exercises.type1.push({ id: index, type: 'order', question: `Reorganize trajectory (Nghĩa: ${vi}):`, words: en.split(' ').sort(() => Math.random() - 0.5), answer: en });
                } else {
                    const typeMap = { 'n': 'Noun', 'v': 'Verb', 'adj': 'Adjective', 'adv': 'Adverb' };
                    const correctType = typeMap[type] || 'Other';
                    const opts = [...new Set(Object.values(typeMap))].sort(() => 0.5 - Math.random());
                    exercises.type1.push({ id: index, type: 'choice', question: `"<span class="font-bold text-slate-100">${en}</span>" classification:`, options: opts, answer: correctType });
                }

                // Type 2 (Translation)
                exercises.type2.push({ id: index, type: 'write', question: `Decode signal: "<span class="font-bold text-cyan-400 font-mono">${vi}</span>"`, answer: en });
            });
            return exercises;
        }

            let cor = 0; let total = 0;
            document.querySelectorAll('#practice-container .prac-input').forEach(inp => {
                total++; const u = inp.value.trim().toLowerCase(); const a = inp.getAttribute('data-ans').toLowerCase(); const fb = inp.nextElementSibling;
                if (u === a) { cor++; inp.classList.add('correct-answer'); fb.innerHTML = "<span class='text-cyan-400'>[VALIDATED]</span>"; } else { inp.classList.add('wrong-answer'); fb.innerHTML = `<span class='text-red-600'>[ERROR: ${a}]</span>`; }
            });
            document.querySelectorAll('#practice-container div[data-ans]').forEach(c => {
                if (!c.getAttribute('data-ans')) return;
                total++; const u = c.getAttribute('data-user-choice'); const a = c.getAttribute('data-ans'); const fb = c.nextElementSibling;
                if (!u) return;
                if (u === a) { cor++; fb.innerHTML = "<span class='text-cyan-400'>[VALIDATED]</span>"; } else { fb.innerHTML = `<span class='text-red-600'>[ERROR: ${a}]</span>`; }
            });
            document.querySelectorAll('div[id^="ans-q-"]').forEach(z => {
                total++; const u = Array.from(z.children).map(s => s.innerText).join(' ').trim().toLowerCase(); const a = z.getAttribute('data-ans').toLowerCase(); const fb = z.nextElementSibling.nextElementSibling;
                if (u === a) { cor++; fb.innerHTML = "<span class='text-cyan-400'>[VALIDATED]</span>"; } else { fb.innerHTML = `<span class='text-red-600'>[ERROR: ${a}]</span>`; }
            });
            showToast(`EFFICIENCY: ${Math.round((cor / total) * 100)}%`);
        }

        function speak(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; window.speechSynthesis.speak(u); }
        function escapeQuote(s) { return s.replace(/'/g, "\\'"); }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.className = "show"; setTimeout(() => t.className = "", 3000); }
        function resetApp() { location.reload(); }
        function toggleInfo() { alert("Unit 11: Future Travel Data Stream - 192 Items."); }
        function toggleNote() { document.getElementById('note-sidebar').classList.toggle('translate-x-full'); }
        function exportToWord() { const t = document.getElementById('note-area').value; const b = new Blob(['\ufeff' + t], { type: 'application/msword' }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'FutureTravelLogs.doc'; a.click(); }
    </script>
</body>
