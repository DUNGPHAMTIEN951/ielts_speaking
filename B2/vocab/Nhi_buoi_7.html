            from {

                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Flashcard 3D */

        }

        .transform-style-3d {

        }

        .backface-hidden {
            backface-visibility: hidden;
        }

        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        .flipped {
            transform: rotateY(180deg);
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .flashcard-front,
        .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 1.5rem;
            background: white;
            border: 2px solid #e2e8f0;
            padding: 1.5rem;
        }

        .flashcard-front {
            background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
        }

        .flashcard-back {
            background: linear-gradient(135deg, #fef9c3 0%, #fef3c7 100%);

        }

        /* Practice Styles */
        .correct-answer {
            background-color: #f0fdf4 !important;

            color: #15803d !important;
        }

            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #b91c1c !important;
        }

        .choice-selected {
            background-color: #f1f5f9;
            border-color: #334155;
            color: #1e293b;
            font-weight: bold;
        }

        .word-bank-item {
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .word-bank-item:hover {
            transform: translateY(-2px);
            background-color: #f1f5f9;
        }

        .word-bank-item.used {
            opacity: 0.5;
            pointer-events: none;
            background-color: #f3f4f6;
            color: #9ca3af;
            border-color: #e5e7eb;
        }

        /* Toast */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }

        /* Pulse */
        .pulse-ring {
            box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.7);

            { id: 112, en: "wave", vi: "vẫy tay", type: "v" },
            { id: 113, en: "shout", vi: "la hét", type: "v" },
            { id: 114, en: "population increase", vi: "gia tăng dân số", type: "n" },
            { id: 115, en: "reason", vi: "lý do", type: "n" },
            { id: 116, en: "million", vi: "triệu", type: "num" },
            { id: 117, en: "narrow", vi: "chật, hẹp", type: "adj" },
            { id: 118, en: "wide", vi: "rộng", type: "adj" },
            { id: 119, en: "bumpy road", vi: "đường gồ ghề", type: "n" },
            { id: 120, en: "run across the road", vi: "chạy qua đường", type: "v" },
            { id: 121, en: "suggestion", vi: "sự gợi ý", type: "n" },
            { id: 122, en: "cyclist", vi: "người đi xe đạp", type: "n" },
            { id: 123, en: "motorist", vi: "người lái xe", type: "n" },
            { id: 124, en: "want to V", vi: "muốn làm gì", type: "v" },
            { id: 125, en: "pilot", vi: "phi công", type: "n" },
            { id: 126, en: "light turns yellow", vi: "đèn chuyển màu vàng", type: "phrase" },
            { id: 127, en: "waterfall", vi: "thác nước", type: "n" },
            { id: 128, en: "put the rubbish in the bin", vi: "bỏ rác vào thùng", type: "v" },
            { id: 129, en: "can V", vi: "có thể làm gì", type: "v" },
            { id: 130, en: "could V", vi: "quá khứ của can", type: "v" },
            { id: 131, en: "cannot V", vi: "không thể làm gì", type: "v" },
            { id: 132, en: "couldn't V", vi: "không thể làm gì (quá khứ)", type: "v" },
            { id: 133, en: "cookies / biscuit", vi: "bánh quy", type: "n" },
            { id: 134, en: "over eighteen", vi: "trên 18 tuổi", type: "phrase" },
            { id: 135, en: "get lost", vi: "bị lạc", type: "v" },
            { id: 136, en: "be good at sth/Ving", vi: "Giỏi cái gì", type: "phrase" }
        ];

        // --- APP LOGIC ---
        let currentTab = 'vocab';
        let currentIndex = 0;
        let isFlipped = false;
        let activeList = [];
        let isShuffled = false;
        let currentMode = 'fill';
        let currentPage = 1;
        const itemsPerPage = 20;
        let fullExercises = {};
        let structIdx = 0;
        let recognition;
        let isRecording = false;

        window.onload = function () {
            document.getElementById('header-count').innerText = vocabData.length;
            activeList = [...vocabData];
            renderVocabLines();
            updateFlashcard();
            renderStructureCard();
            fullExercises = generateExerciseData();
            switchPracticeMode('fill');
        };

        function generateExerciseData() {
            const exercises = { fill: [], wf: [], gram: [], type1: [], type2: [] };
            vocabData.forEach((word, index) => {
                const en = word.en.trim();
                const vi = word.vi.trim();
                const type = word.type ? word.type.trim().toLowerCase() : '';

                // Spelling
                let masked = en.split('').map(c => (c === ' ' || c === '/' || Math.random() > 0.5) ? c : '_').join('');
                if (!masked.includes('_')) masked = en.replace(/./, '_');
                exercises.fill.push({ id: index, word: en, question: `Spelling: <span class="font-mono font-bold text-slate-800 text-lg tracking-widest bg-slate-50 px-2 py-1 rounded border border-slate-200">${masked}</span> <br><span class="text-xs text-gray-400 italic">Hint: ${vi}</span>`, answer: en });

                // WF
                let wfQ = type.includes('v') ? `You should _______ the rules.` : type.includes('n') ? `This _______ is very busy.` : `The road is _______ .`;
                exercises.wf.push({ id: index, root: en, question: `<div>${wfQ}</div><div class="text-xs text-gray-400 mt-1">Gợi ý: ${vi} (${type})</div>`, answer: en });

                // Grammar - Focus on "should" or distance
                if (en.toLowerCase().includes('should')) {
                    exercises.gram.push({ id: index, word: en, question: `Complete: You (should/shouldn't) _______ follow traffic rules.`, answer: 'should' });
                } else if (en.startsWith('How far')) {
                    exercises.gram.push({ id: index, word: en, question: `Fill: _______ far is it from here?`, answer: 'How' });
                } else {
                    exercises.gram.push({ id: index, word: en, question: `Rewrite the word correctly: <span class="font-bold text-slate-800">${en}</span>`, answer: en });
                }

                // Type 1 (Multiple Choice)
                if (en.includes(' ')) {
                    exercises.type1.push({ id: index, type: 'order', question: `Reorder to form phrase (Nghĩa: ${vi}):`, words: en.split(' ').sort(() => Math.random() - 0.5), answer: en });
                } else {
                    const typeMap = { 'n': 'Noun', 'v': 'Verb', 'adj': 'Adjective', 'adv': 'Adverb' };
                    const correctType = typeMap[type] || 'Other';
                    const opts = [...new Set(Object.values(typeMap))].sort(() => 0.5 - Math.random());
                    exercises.type1.push({ id: index, type: 'choice', question: `"<span class="font-bold text-slate-800">${en}</span>" is a:`, options: opts, answer: correctType });
                }

                // Type 2 (Translation)
                exercises.type2.push({ id: index, type: 'write', question: `Dịch sang tiếng Anh: "<span class="font-bold text-blue-600">${vi}</span>"`, answer: en });
            });
            return exercises;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active', 'bg-slate-100'));
            document.getElementById(`tab-${tab}`).classList.add('tab-active', 'bg-slate-100');
            document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden-section'));
            document.getElementById(`section-${tab}`).classList.remove('hidden-section');
        }

        function renderVocabLines(filter = "") {
            const grid = document.getElementById('vocab-grid'); grid.innerHTML = "";
            const filtered = vocabData.filter(item => item.en.toLowerCase().includes(filter.toLowerCase()) || item.vi.toLowerCase().includes(filter.toLowerCase()));
            document.getElementById('vocab-count').innerText = filtered.length;
            filtered.forEach(item => {
                const el = document.createElement('div');
                el.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition group flex justify-between items-center";
                el.innerHTML = `<div><div class="flex items-center gap-2 mb-1"><span class="text-xs font-bold text-gray-300">#${item.id}</span><span class="text-[10px] bg-yellow-100 text-yellow-700 px-1 rounded uppercase">${item.type}</span></div><h3 class="text-lg font-bold text-slate-800 group-hover:text-slate-600 transition">${item.en}</h3><p class="text-gray-500 text-sm">${item.vi}</p></div><button onclick="speak('${escapeQuote(item.en)}')" class="text-slate-300 hover:text-slate-600 transition"><i class="fas fa-volume-up text-lg"></i></button>`;
                grid.appendChild(el);
            });
        }
        function filterVocab() { renderVocabLines(document.getElementById('searchInput').value); }

        function updateFlashcard() {
            const item = activeList[currentIndex];
            isFlipped = false; document.getElementById('flashcard-inner').classList.remove('flipped');
            document.getElementById('fc-index').innerText = `${currentIndex + 1} / ${activeList.length}`;
            document.getElementById('fc-front-text').innerText = item.en;
            document.getElementById('fc-back-text').innerText = item.vi;
            document.getElementById('fc-back-type').innerText = item.type;
            document.getElementById('fc-back-sent').innerText = `We must be careful of ${item.en} on the road.`;
            if (document.getElementById('auto-speak').checked) speak(item.en);
        }
        function flipCard() { isFlipped = !isFlipped; document.getElementById('flashcard-inner').classList.toggle('flipped', isFlipped); }
        function changeCard(dir) { currentIndex += dir; if (currentIndex < 0) currentIndex = activeList.length - 1; if (currentIndex >= activeList.length) currentIndex = 0; updateFlashcard(); }
        function toggleShuffle() { isShuffled = !isShuffled; activeList = isShuffled ? [...vocabData].sort(() => Math.random() - 0.5) : [...vocabData]; currentIndex = 0; updateFlashcard(); }
        function speakCurrentCard() { speak(activeList[currentIndex].en); }

        function renderStructureCard() {
            const word = vocabData[structIdx];
            const container = document.getElementById('structure-card-container');
            container.innerHTML = `<div class="bg-white rounded-xl shadow-lg p-6 max-w-2xl mx-auto"><div class="text-center mb-6"><h2 class="text-3xl font-extrabold text-slate-800 mb-1">${word.en}</h2><p class="text-gray-400 text-sm">(${word.vi})</p></div><div class="border-t border-gray-100 pt-6 text-center"><p class="font-bold text-gray-700 mb-3">Thử nói:</p><p class="text-xl font-bold text-slate-800 mb-6">"You should obey the ${word.en} for your safety."</p><button id="record-btn" onclick="toggleRecording()" class="w-16 h-16 rounded-full bg-slate-700 hover:bg-slate-800 text-yellow-400 shadow-lg flex items-center justify-center mx-auto transition transform active:scale-95"><i class="fas fa-microphone text-2xl"></i></button><p id="transcript-result" class="text-sm text-gray-400 mt-3 h-6 italic">Nhấn mic để nói...</p></div></div>`;
        }
        function nextStructureCard() { structIdx = (structIdx + 1) % vocabData.length; renderStructureCard(); }
        function prevStructureCard() { structIdx = (structIdx - 1 + vocabData.length) % vocabData.length; renderStructureCard(); }
        function toggleRecording() {
            if (!('webkitSpeechRecognition' in window)) { showToast("Not supported"); return; }
            if (isRecording) { recognition.stop(); return; }
            const btn = document.getElementById('record-btn'); recognition = new webkitSpeechRecognition(); recognition.lang = 'en-US';
            recognition.onstart = () => { isRecording = true; btn.classList.add('pulse-ring'); document.getElementById('transcript-result').innerText = "Đang nghe..."; };
            recognition.onresult = (e) => { const x = e.results[0][0].transcript; document.getElementById('transcript-result').innerText = `"${x}"`; if (x.toLowerCase().includes(vocabData[structIdx].en.toLowerCase())) showToast("🎉 Safety First!"); };
            recognition.onend = () => { isRecording = false; btn.classList.remove('pulse-ring'); };
            recognition.start();
        }

        function switchPracticeMode(mode) { currentMode = mode; currentPage = 1; renderPagination(); renderPracticePage(); }
        function renderPagination() {
            const total = fullExercises[currentMode].length; const pages = Math.ceil(total / itemsPerPage);
            const container = document.getElementById('pagination-controls'); container.innerHTML = '';
            for (let i = 1; i <= pages; i++) { if (i > 3 && i < pages - 1) { if (i === 4) container.innerHTML += '...'; continue; } const btn = document.createElement('button'); btn.className = `px-3 py-1 rounded text-sm font-bold border transition ${i === currentPage ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-gray-600 hover:bg-gray-50 border-gray-200'}`; btn.innerText = i; btn.onclick = () => { currentPage = i; renderPagination(); renderPracticePage(); }; container.appendChild(btn); }
            document.getElementById('practice-stats').innerText = `Trang ${currentPage}/${pages}`;
        }
        function renderPracticePage() {
            const container = document.getElementById('practice-container'); container.innerHTML = '';
            const start = (currentPage - 1) * itemsPerPage; const end = start + itemsPerPage;
            const data = fullExercises[currentMode].slice(start, end);
            const list = document.createElement('div'); list.className = "bg-white rounded-xl shadow-sm border border-gray-100";
            data.forEach((item, i) => {
                const row = document.createElement('div'); row.className = "p-4 border-b border-gray-50 flex flex-col gap-2";
                row.innerHTML = `<div class="text-[10px] uppercase text-gray-300 font-bold text-right">#${start + i + 1}</div><div class="mb-2 font-medium">${item.question}</div>`;
                if (item.type === 'order') {
                    row.innerHTML += `<div id="ans-q-${start + i}" class="min-h-[40px] bg-slate-50 border border-dashed border-slate-200 rounded p-2 flex flex-wrap gap-2 mb-2" data-ans="${item.answer}"></div><div id="bank-q-${start + i}" class="flex flex-wrap gap-2">${item.words.map(w => `<span onclick="moveWord(this, 'ans-q-${start + i}', 'bank-q-${start + i}')" class="word-bank-item bg-white px-2 py-1 rounded border text-xs shadow-sm">${w}</span>`).join('')}</div>`;
                } else if (item.options) {
                    row.innerHTML += `<div class="grid grid-cols-1 md:grid-cols-2 gap-2" data-ans="${item.answer}">${item.options.map(o => `<button onclick="selectChoice(this)" class="p-2 border rounded-lg text-left hover:bg-slate-50 text-sm transition">${o}</button>`).join('')}</div>`;
                } else {
                    row.innerHTML += `<input type="text" data-ans="${item.answer}" class="prac-input w-full p-2 border border-gray-200 rounded focus:border-slate-500 outline-none text-sm" placeholder="...">`;
                }
                row.innerHTML += `<div class="prac-feedback mt-1"></div>`;
                list.appendChild(row);
            });
            container.appendChild(list);
        }

        window.moveWord = function (el, tId, oId) { const t = document.getElementById(tId); const o = document.getElementById(oId); if (el.parentElement.id === oId) t.appendChild(el); else o.appendChild(el); }
        window.selectChoice = function (btn) { const p = btn.parentElement; p.querySelectorAll('button').forEach(b => b.classList.remove('choice-selected')); btn.classList.add('choice-selected'); p.setAttribute('data-user-choice', btn.innerText); }

        function checkCurrentPage() {
            let cor = 0; let total = 0;
            document.querySelectorAll('#practice-container .prac-input').forEach(inp => {
                total++; const u = inp.value.trim().toLowerCase(); const a = inp.getAttribute('data-ans').toLowerCase(); const fb = inp.nextElementSibling;
                if (u === a) { cor++; inp.classList.add('correct-answer'); fb.innerHTML = "✅ Đúng!"; } else { inp.classList.add('wrong-answer'); fb.innerHTML = `❌ ${a}`; }
            });
            document.querySelectorAll('.choice-container, div[data-ans]').forEach(c => {
                if (!c.getAttribute('data-ans')) return;
                total++; const u = c.getAttribute('data-user-choice'); const a = c.getAttribute('data-ans'); const fb = c.nextElementSibling;
                if (!u) return;
                if (u === a) { cor++; fb.innerHTML = "✅ Đúng!"; } else { fb.innerHTML = `❌ ${a}`; }
            });
            document.querySelectorAll('div[id^="ans-q-"]').forEach(z => {
                total++; const u = Array.from(z.children).map(s => s.innerText).join(' ').trim().toLowerCase(); const a = z.getAttribute('data-ans').toLowerCase(); const fb = z.nextElementSibling.nextElementSibling;
                if (u === a) { cor++; fb.innerHTML = "✅ Đúng!"; } else { fb.innerHTML = `❌ ${a}`; }
            });
            showToast(`${cor}/${total} Correct!`);
        }

        function speak(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; window.speechSynthesis.speak(u); }
        function escapeQuote(s) { return s.replace(/'/g, "\\'"); }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.className = "show"; setTimeout(() => t.className = "", 3000); }
        function resetApp() { location.reload(); }
        function toggleInfo() { alert("Unit 7: Traffic - 136 Words."); }
        function toggleNote() { document.getElementById('note-sidebar').classList.toggle('translate-x-full'); }
        function exportToWord() { const t = document.getElementById('note-area').value; const b = new Blob(['\ufeff' + t], { type: 'application/msword' }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'TrafficNotes.doc'; a.click(); }
    </script>
