<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velorah® — Where dreams rise</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: 'hsl(201, 100%, 13%)',
                        foreground: 'hsl(0, 0%, 100%)',
                        muted: {
                            DEFAULT: 'hsl(0, 0%, 10%)',
                            foreground: 'hsl(240, 4%, 66%)',
                        },
                        primary: {
                            DEFAULT: 'hsl(0, 0%, 100%)',
                            foreground: 'hsl(0, 0%, 4%)',
                        },
                        secondary: 'hsl(0, 0%, 10%)',
                        border: 'hsl(0, 0%, 18%)',
                        input: 'hsl(0, 0%, 18%)',
                    },
                    fontFamily: {
                        display: ['"Instrument Serif"', 'serif'],
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --background: 201 100% 13%;
            --foreground: 0 0% 100%;
            --muted-foreground: 240 4% 66%;
            --primary: 0 0% 100%;
            --primary-foreground: 0 0% 4%;
            --border: 0 0% 18%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            margin: 0;
            overflow-x: hidden;
        }

        .liquid-glass {
            background: rgba(255, 255, 255, 0.01);
            background-blend-mode: luminosity;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: none;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .liquid-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1.4px;
            background: linear-gradient(180deg,
                rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%,
                rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
                rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        @keyframes fade-rise {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-rise { animation: fade-rise 0.8s ease-out both; }
        .animate-fade-rise-delay { animation: fade-rise 0.8s ease-out 0.2s both; }
        .animate-fade-rise-delay-2 { animation: fade-rise 0.8s ease-out 0.4s both; }

        h1, .font-display {
            font-family: 'Instrument Serif', serif;
        }

        .not-italic {
            font-style: normal;
        }
        
        /* Video background contrast */
        .video-overlay {
            background: rgba(15, 23, 42, 0.2); /* Subtle darkening */
        }
    </style>
</head>
<body class="min-h-screen relative flex flex-col">
    <!-- Video Background -->
    <div class="fixed inset-0 w-full h-full z-0 pointer-events-none">
        <video autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-cover">
            <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260314_131748_f2ca2a28-fed7-44c8-b9a9-bd9acdd5ec31.mp4" type="video/mp4">
        </video>
        <div class="absolute inset-0 video-overlay"></div>
    </div>

    <!-- Navigation Bar -->
    <header class="relative z-10 w-full">
        <nav class="max-w-7xl mx-auto px-8 py-6 flex flex-row justify-between items-center">
            <div class="text-3xl tracking-tight font-display text-white">
                Velorah<sup class="text-xs">®</sup>
            </div>
            
            <div class="hidden md:flex gap-8 items-center">
                <a href="#" class="text-sm text-white font-medium">Home</a>
                <a href="#" class="text-sm text-muted-foreground hover:text-white transition-colors">Studio</a>
                <a href="#" class="text-sm text-muted-foreground hover:text-white transition-colors">About</a>
                <a href="#" class="text-sm text-muted-foreground hover:text-white transition-colors">Journal</a>
                <a href="#" class="text-sm text-muted-foreground hover:text-white transition-colors">Reach Us</a>
            </div>

            <a href="speaking-app.html" class="liquid-glass rounded-full px-6 py-2.5 text-sm text-white hover:scale-[1.03] active:scale-[0.98]">
                Begin Journey
            </a>
        </nav>
    </header>

    <!-- Hero Section -->
    <main class="relative z-10 flex-grow flex flex-col items-center justify-center text-center px-6 py-[90px]">
        <h1 class="text-5xl sm:text-7xl md:text-8xl leading-[0.95] tracking-[-2.46px] max-w-7xl font-normal text-white animate-fade-rise">
            Where <em class="not-italic text-muted-foreground">dreams</em> rise <br class="hidden md:block"> <em class="not-italic text-muted-foreground">through the silence.</em>
        </h1>
        
        <p class="text-muted-foreground text-base sm:text-lg max-w-2xl mt-8 leading-relaxed animate-fade-rise-delay">
            We're designing tools for deep thinkers, bold creators, and quiet rebels. Amid the chaos, we build digital spaces for sharp focus and inspired work.
        </p>

        <a href="speaking-app.html" class="liquid-glass rounded-full px-14 py-5 text-base text-white mt-12 hover:scale-[1.03] active:scale-[0.98] cursor-pointer animate-fade-rise-delay-2">
            Begin Journey
        </a>
    </main>

</body>
</html>
