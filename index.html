<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velorah® — Where dreams rise</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: 'hsl(201, 100%, 13%)',
                        foreground: 'hsl(0, 0%, 100%)',
                        muted: {
                            DEFAULT: 'hsl(0, 0%, 10%)',
                            foreground: 'hsl(240, 4%, 66%)',
                        },
                        primary: {
                            DEFAULT: 'hsl(0, 0%, 100%)',
                            foreground: 'hsl(0, 0%, 4%)',
                        },
                        secondary: 'hsl(0, 0%, 10%)',
                        accent: 'hsl(0, 0%, 10%)',
                        border: 'hsl(0, 0%, 18%)',
                        input: 'hsl(0, 0%, 18%)',
                    },
                    fontFamily: {
                        display: ['"Instrument Serif"', 'serif'],
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --font-display: 'Instrument Serif', serif;
            --font-body: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background-color: hsl(201, 100%, 13%);
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .liquid-glass {
            background: rgba(255, 255, 255, 0.01);
            background-blend-mode: luminosity;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: none;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .liquid-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1.4px;
            background: linear-gradient(180deg,
                rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%,
                rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
                rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        @keyframes fade-rise {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-rise { animation: fade-rise 0.8s ease-out both; }
        .animate-fade-rise-delay { animation: fade-rise 0.8s ease-out 0.2s both; }
        .animate-fade-rise-delay-2 { animation: fade-rise 0.8s ease-out 0.4s both; }

        .instrument-serif {
            font-family: var(--font-display);
        }
        
        video {
            filter: brightness(0.7);
        }
    </style>
</head>
<body>
    <!-- Fullscreen Video Background -->
    <div class="fixed inset-0 w-full h-full z-0 overflow-hidden">
        <video autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-cover">
            <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260314_131748_f2ca2a28-fed7-44c8-b9a9-bd9acdd5ec31.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Navigation Bar -->
    <nav class="relative z-10 max-w-7xl mx-auto px-8 py-6 flex flex-row justify-between items-center">
        <div class="text-3xl tracking-tight instrument-serif text-white">
            Velorah<sup class="text-xs">®</sup>
        </div>
        
        <div class="hidden md:flex gap-8 items-center">
            <a href="#" class="text-sm text-white font-medium">Home</a>
            <a href="#" class="text-sm text-muted-foreground hover:text-white transition-colors">Studio</a>
            <a href="#" class="text-sm text-muted-foreground hover:text-white transition-colors">About</a>
            <a href="#" class="text-sm text-muted-foreground hover:text-white transition-colors">Journal</a>
            <a href="#" class="text-sm text-muted-foreground hover:text-white transition-colors">Reach Us</a>
        </div>

        <a href="speaking-app.html" class="liquid-glass rounded-full px-6 py-2.5 text-sm text-white hover:scale-[1.03] inline-block">
            Begin Journey
        </a>
    </nav>

    <!-- Hero Section -->
    <section class="relative z-10 flex flex-col items-center justify-center text-center px-6 pt-32 pb-40">
        <h1 class="text-5xl sm:text-7xl md:text-8xl leading-[0.95] tracking-[-2.46px] max-w-7xl font-normal instrument-serif animate-fade-rise">
            Where <em class="not-italic text-muted-foreground">dreams</em> rise <br class="hidden md:block"> <em class="not-italic text-muted-foreground">through the silence.</em>
        </h1>
        
        <p class="text-muted-foreground text-base sm:text-lg max-w-2xl mt-8 leading-relaxed animate-fade-rise-delay">
            We're designing tools for deep thinkers, bold creators, and quiet rebels. Choose your curriculum and begin your cinematic learning journey.
        </p>

        <div class="mt-12 flex flex-wrap justify-center gap-4 animate-fade-rise-delay-2">
            <a href="speaking-app.html?type=ielts" class="liquid-glass rounded-full px-10 py-4 text-base text-white hover:scale-[1.03] cursor-pointer inline-block border border-white/10">
                IELTS Prep
            </a>
            <a href="speaking-app.html?type=toeic" class="liquid-glass rounded-full px-10 py-4 text-base text-white hover:scale-[1.03] cursor-pointer inline-block border border-white/10">
                TOEIC Master
            </a>
            <a href="speaking-app.html?type=b2" class="liquid-glass rounded-full px-10 py-4 text-base text-white hover:scale-[1.03] cursor-pointer inline-block border border-white/10">
                B2 Curriculum
            </a>
        </div>
    </section>

</body>
</html>
